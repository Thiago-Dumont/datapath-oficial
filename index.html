<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPath — Oficial</title>
    <!-- Bibliotecas Core (React 18 + Babel para tradução em tempo real) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fontes Oficiais -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020817; color: #e2e8f0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020817; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        input:focus, textarea:focus, select:focus { outline: none !important; border-color: #6366f1 !important; box-shadow: 0 0 0 3px #6366f115; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

        // ============================================================
        // DATAPATH — LÓGICA INTEGRAL (SEGURANÇA E PERSISTÊNCIA)
        // ============================================================

        const Security = {
            hashPassword: async (pw) => {
                const data = new TextEncoder().encode(pw + "dp_salt_x9k2");
                const hash = await crypto.subtle.digest("SHA-256", data);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
            },
            sanitize: (s) => typeof s === "string" ? s.replace(/[<>&"']/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#x27;"}[c])) : "",
            validateEmail: (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e),
            validatePassword: (p) => p.length >= 8 && /[A-Z]/.test(p) && /[0-9]/.test(p),
            generateJWT: (uid) => {
                const h = btoa(JSON.stringify({alg:"HS256",typ:"JWT"}));
                const p = btoa(JSON.stringify({sub:uid,iat:Date.now(),exp:Date.now()+86400000}));
                const s = btoa(uid+"dp_secret_key");
                return `${h}.${p}.${s}`;
            },
            verifyJWT: (token) => {
                try { const d = JSON.parse(atob(token.split(".")[1])); return d.exp > Date.now() ? d : null; }
                catch { return null; }
            },
        };

        const RL = { _a: {}, check(k, max=5, win=900000) {
            const now = Date.now();
            this._a[k] = (this._a[k]||[]).filter(t=>now-t<win);
            if (this._a[k].length >= max) return false;
            this._a[k].push(now); return true;
        }};

        const DB = {
            g: (k) => { try { return JSON.parse(localStorage.getItem("dp_"+k)||"null"); } catch { return null; }},
            s: (k,v) => { try { localStorage.setItem("dp_"+k, JSON.stringify(v)); } catch {} },
            users: () => DB.g("users") || {},
            setUsers: (u) => DB.s("users", u),
            progress: (id) => DB.g("prog_"+id) || defProgress(id),
            setProgress: (id,p) => DB.s("prog_"+id, p),
            notes: (id) => DB.g("notes_"+id) || [],
            setNotes: (id,n) => DB.s("notes_"+id, n),
            portfolio: (id) => DB.g("pf_"+id) || [],
            setPortfolio: (id,p) => DB.s("pf_"+id, p),
            resume: (id) => DB.g("cv_"+id) || defResume(),
            setResume: (id,r) => DB.s("cv_"+id, r),
            goals: (id) => DB.g("goals_"+id) || [],
            setGoals: (id,g) => DB.s("goals_"+id, g),
            habits: (id) => DB.g("habits_"+id) || defHabits(),
            setHabits: (id,h) => DB.s("habits_"+id, h),
            checklist: (id) => DB.g("check_"+id) || [],
            setChecklist: (id,c) => DB.s("check_"+id, c),
        };

        const defProgress = (id) => ({
            userId:id, xp:0, level:1, streak:0, lastStudy:null,
            completedDays:[], achievements:[], trackProgress:{python:0,sql:0,powerbi:0,english:0}
        });
        const defResume = () => ({
            name:"",title:"",email:"",phone:"",linkedin:"",github:"",
            summary:"",skills:[],experience:[],education:[],projects:[],certifications:[]
        });
        const defHabits = () => ([
            {id:1,name:"Estudar Python",streak:0,done:false,color:"#3b82f6"},
            {id:2,name:"Praticar SQL",streak:0,done:false,color:"#10b981"},
            {id:3,name:"Inglês técnico",streak:0,done:false,color:"#f59e0b"},
            {id:4,name:"Revisão do dia",streak:0,done:false,color:"#8b5cf6"},
        ]);

        const calcLevel = (xp) => Math.floor(Math.sqrt(xp/100))+1;
        const xpForLevel = (lvl) => (lvl-1)*(lvl-1)*100;
        const xpForNext = (lvl) => lvl*lvl*100;

        // ============================================================
        // CONTEÚDO INTEGRAL DE 90 DIAS POR TRILHA
        // ============================================================

        const generateTrack = (trackName, prefix, color) => {
            const themes = {
                python: ["Sintaxe", "Estruturas", "Funções", "Pandas", "Limpeza", "Visualização", "APIs", "ETL", "Projeto"],
                sql: ["Básico", "Filtros", "Agrupamento", "Joins", "Subqueries", "CTEs", "Window Func", "Performance", "Cases"],
                powerbi: ["Interface", "Power Query", "Modelagem", "DAX Básico", "DAX Avançado", "Viz", "Dashboards", "Publish", "Admin"]
            };
            
            return Array.from({ length: 90 }, (_, i) => {
                const dayNum = i + 1;
                const theme = themes[trackName][Math.floor(i / 10)];
                return {
                    id: `${prefix}_${dayNum}`,
                    day: dayNum,
                    track: trackName,
                    color: color,
                    title: `${theme}: Parte ${ (i % 10) + 1 }`,
                    phase: i < 30 ? 1 : i < 60 ? 2 : i < 75 ? 3 : 4,
                    xp: 50 + (i),
                    mission: `Meta do Dia ${dayNum}: Aprofundar em ${theme} focado em análise de dados.`,
                    tasks: [
                        `Estudar conteúdo de ${theme}`,
                        `Realizar exercício prático do dia ${dayNum}`,
                        `Documentar aprendizado no Notion`,
                        `Commit de progresso no GitHub`
                    ],
                    english: `Tech Term: "${trackName === 'python' ? 'list comprehension' : trackName === 'sql' ? 'outer join' : 'measure'}"`,
                    practice: `Desafio: Construir um script/query/dashboard focado em ${theme}.`
                };
            });
        };

        const DAY_DATA = [
            ...generateTrack("python", "py", "#3b82f6"),
            ...generateTrack("sql", "sql", "#10b981"),
            ...generateTrack("powerbi", "pbi", "#f59e0b")
        ];

        const TABLES = {
            produtos:[
                {id:1,nome:"Laptop Pro",categoria:"Tech",preco:3500,estoque:10},
                {id:2,nome:"Monitor 4K",categoria:"Tech",preco:1200,estoque:25},
                {id:3,nome:"Teclado Mecânico",categoria:"Periféricos",preco:350,estoque:50}
            ],
            vendas:[
                {id:1,produto:"Laptop Pro",vendedor:"Ana",valor:3500,data:"2024-01-15",categoria:"Tech"},
                {id:2,produto:"Monitor 4K",vendedor:"João",valor:1200,data:"2024-01-16",categoria:"Tech"}
            ],
            clientes:[
                {id:1,nome:"Carlos Silva",cidade:"São Paulo",plano:"Premium"},
                {id:2,nome:"Ana Lima",cidade:"Rio de Janeiro",plano:"Básico"}
            ],
        };

        function runSQL(q) {
            const ql = q.toLowerCase().trim();
            if (!ql.startsWith("select")) return {error:"Apenas SELECT é permitido."};
            let rows = [];
            if (ql.includes("from produtos")) rows = [...TABLES.produtos];
            else if (ql.includes("from vendas")) rows = [...TABLES.vendas];
            else if (ql.includes("from clientes")) rows = [...TABLES.clientes];
            else return {error:"Tabelas: produtos, vendas, clientes"};
            return {rows, count:rows.length};
        }

        // ── CONTEXTOS ────────────────────────────────────
        const AuthCtx = createContext(null);
        const ProgCtx = createContext(null);
        const FIXED_USER = { id: "master-user", name: "Estudante de Dados" };

        function AuthProvider({children}) {
            const [user] = useState(FIXED_USER);
            return <AuthCtx.Provider value={{user,loading:false}}>{children}</AuthCtx.Provider>;
        }

        function ProgressProvider({children}) {
            const {user}=useContext(AuthCtx);
            const [progress,setProgress]=useState(null);
            useEffect(()=>{ if(user) setProgress(DB.progress(user.id)); },[user]);

            const save=useCallback((upd)=>{
                const cur=DB.progress(user.id);
                const updated={...cur,...upd}; updated.level=calcLevel(updated.xp);
                DB.setProgress(user.id,updated); setProgress({...updated}); return updated;
            },[user]);

            const completeDay=useCallback((dayId,xpAmt)=>{
                const cur=DB.progress(user.id);
                if(cur.completedDays.includes(dayId)) return;
                const days=[...cur.completedDays,dayId];
                save({completedDays:days,xp:cur.xp+xpAmt,lastStudy:new Date().toDateString()});
            },[user,save]);

            return <ProgCtx.Provider value={{progress,save,completeDay}}>{children}</ProgCtx.Provider>;
        }

        const useAuth=()=>useContext(AuthCtx);
        const useProgress=()=>useContext(ProgCtx);

        // ── UI PRIMITIVES ──────────────────────────────────
        const C = { bg:"#020817", surface:"#0a1628", card:"#0f172a", border:"#1e293b", text:"#e2e8f0", muted:"#64748b", accent:"#6366f1", yellow:"#f59e0b", red:"#ef4444", green:"#10b981", blue:"#3b82f6" };

        const XPBar = ({xp,level}) => {
            const lo=xpForLevel(level), hi=xpForNext(level);
            const pct=Math.min(100,((xp-lo)/(hi-lo))*100);
            return (
                <div style={{width:"100%"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}><span>Nível {level}</span><span>{xp} XP</span></div>
                    <div style={{background:C.border,borderRadius:999,height:7}}>
                        <div style={{width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",height:"100%",borderRadius:999,transition:"width 0.7s"}}/>
                    </div>
                </div>
            );
        };

        const Btn = ({children,onClick,v="primary",sx={}}) => {
            const vs={
                primary:{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none"},
                secondary:{background:C.card,color:C.text,border:`1px solid ${C.border}`},
                python:{background:C.blue,color:"#fff",border:"none"},
                sql:{background:C.green,color:"#fff",border:"none"},
                powerbi:{background:C.yellow,color:"#000",border:"none"},
            };
            return <button onClick={onClick} style={{padding:"10px 20px",borderRadius:8,fontWeight:700,cursor:"pointer",...vs[v],...sx}}>{children}</button>;
        };

        const Card = ({children,sx={}}) => <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22,...sx}}>{children}</div>;
        const Badge = ({text,color=C.accent}) => <span style={{background:color+"22",color,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,border:`1px solid ${color}44`}}>{text}</span>;

        // ── PÁGINAS ───────────────────────────────────────

        function Dashboard({go}) {
            const {progress}=useProgress();
            if(!progress) return null;
            return (
                <div style={{maxWidth:1100,margin:"0 auto",display:"flex",flexDirection:"column",gap:20,animation:"fadeIn 0.5s"}}>
                    <div style={{background:"linear-gradient(135deg,#1e1b4b,#1a2744)",border:`1px solid ${C.border}`,borderRadius:18,padding:30}}>
                        <h2 style={{fontFamily:"'Syne'",fontSize:28,marginBottom:10}}>Dashboard de Estudos</h2>
                        <p style={{color:C.muted,marginBottom:20}}>Você possui {progress.completedDays.length} dias concluídos no total.</p>
                        <div style={{display:"flex",gap:10}}><Btn onClick={()=>go("journey")}>Ir para as Trilhas</Btn></div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px, 1fr))",gap:15}}>
                        <Card><h4>Nível Atual</h4><XPBar xp={progress.xp} level={progress.level}/></Card>
                        <Card><h4>XP Total</h4><p style={{fontSize:24,fontWeight:900,color:C.accent}}>⚡ {progress.xp}</p></Card>
                        <Card><h4>Trilhas Ativas</h4><p style={{color:C.muted}}>Python, SQL e Power BI</p></Card>
                    </div>
                </div>
            );
        }

        function Journey() {
            const {progress,completeDay}=useProgress();
            const [activeTrack, setActiveTrack] = useState("python");
            const [sel,setSel]=useState(null);

            if(!progress) return null;

            const filteredDays = DAY_DATA.filter(d => d.track === activeTrack);
            const completedInTrack = filteredDays.filter(d => progress.completedDays.includes(d.id)).length;

            if(sel) return (
                <div style={{maxWidth:700,margin:"0 auto",animation:"fadeIn 0.3s"}}>
                    <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",marginBottom:20, fontWeight:800}}>← VOLTAR AO MAPA</button>
                    <Card>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                            <Badge text={`${activeTrack.toUpperCase()} - DIA ${sel.day}`}/>
                            <Badge text={`+${sel.xp} XP`} color={C.green}/>
                        </div>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>{sel.title}</h2>
                        <p style={{lineHeight:1.6,marginBottom:20, fontSize:18}}>{sel.mission}</p>
                        <div style={{background:C.surface,padding:20,borderRadius:10,marginBottom:20, borderLeft:`4px solid ${sel.color}`}}>
                            <h4 style={{marginBottom:10,color:sel.color}}>Microtarefas obrigatórias:</h4>
                            {sel.tasks.map((t,i)=><div key={i} style={{marginBottom:8, display:"flex", alignItems:"center", gap:10}}>
                                <input type="checkbox" readOnly checked={progress.completedDays.includes(sel.id)} /> {t}
                            </div>)}
                        </div>
                        <div style={{padding:15, background:C.bg, borderRadius:10, marginBottom:20}}>
                            <p><strong>Practice:</strong> {sel.practice}</p>
                            <p style={{marginTop:10, fontSize:14, color:C.muted}}>{sel.english}</p>
                        </div>
                        {progress.completedDays.includes(sel.id) 
                            ? <div style={{color:C.green,fontWeight:800,textAlign:"center", padding:20, border:`2px solid ${C.green}`, borderRadius:10}}>✅ DIA CONCLUÍDO</div>
                            : <Btn sx={{width:"100%", padding:20}} onClick={()=>{completeDay(sel.id,sel.xp);setSel(null);}}>CONCLUIR MISSÃO</Btn>
                        }
                    </Card>
                </div>
            );

            return (
                <div style={{animation:"fadeIn 0.5s"}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:30}}>
                        <h2 style={{fontFamily:"'Syne'"}}>Mapa de Especialização</h2>
                        <div style={{display:"flex", gap:10}}>
                            <Btn v={activeTrack === 'python' ? 'python' : 'secondary'} onClick={()=>setActiveTrack('python')}>Python</Btn>
                            <Btn v={activeTrack === 'sql' ? 'sql' : 'secondary'} onClick={()=>setActiveTrack('sql')}>SQL</Btn>
                            <Btn v={activeTrack === 'powerbi' ? 'powerbi' : 'secondary'} onClick={()=>setActiveTrack('powerbi')}>Power BI</Btn>
                        </div>
                    </div>

                    <Card sx={{marginBottom:20, textAlign:"center"}}>
                        <p>Progresso na Trilha {activeTrack.toUpperCase()}: <strong>{completedInTrack} / 90 dias</strong></p>
                    </Card>

                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:12}}>
                        {filteredDays.map(d => {
                            const done=progress.completedDays.includes(d.id);
                            // Lógica de bloqueio: só permite clicar no dia atual ou anteriores
                            const isLocked = d.day > (completedInTrack + 1);
                            
                            return (
                                <div key={d.id} onClick={()=>!isLocked && setSel(d)} style={{
                                    height:80, borderRadius:12, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                                    cursor:isLocked?"not-allowed":"pointer",
                                    background:done?d.color:isLocked?C.surface:C.card,
                                    border:`1px solid ${done?d.color:C.border}`, 
                                    opacity:isLocked?0.4:1,
                                    transition: "all 0.2s ease"
                                }}>
                                    <div style={{fontSize:10,color:done?"#000":C.muted, fontWeight:800}}>DIA</div>
                                    <div style={{fontSize:22,fontWeight:900, color:done?"#000":"#fff"}}>{d.day}</div>
                                    {done && <div style={{fontSize:12, color:"#000"}}>✓</div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function SQLConsole() {
            const [q,setQ]=useState("SELECT * FROM produtos;");
            const [res,setRes]=useState(null);
            return (
                <div style={{maxWidth:900,margin:"0 auto",animation:"fadeIn 0.5s"}}>
                    <Card>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>SQL Sandbox</h2>
                        <textarea value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",height:150,background:"#000",color:C.green,padding:15,fontFamily:"monospace",borderRadius:8,border:"none", fontSize:16}}/>
                        <Btn sx={{marginTop:15}} onClick={()=>setRes(runSQL(q))}>Executar Query</Btn>
                    </Card>
                    {res && (
                        <Card sx={{marginTop:20,overflowX:"auto"}}>
                            {res.error ? <span style={{color:C.red}}>{res.error}</span> : (
                                <table style={{width:"100%",borderCollapse:"collapse"}}>
                                    <thead><tr>{Object.keys(res.rows[0]||{}).map(k=><th key={k} style={{textAlign:"left",padding:12,borderBottom:`2px solid ${C.border}`}}>{k}</th>)}</tr></thead>
                                    <tbody>{res.rows.map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j} style={{padding:12, borderBottom:`1px solid ${C.border}`}}>{String(v)}</td>)}</tr>)}</tbody>
                                </table>
                            )}
                        </Card>
                    )}
                </div>
            );
        }

        function AppShell() {
            const [page,setPage]=useState("dashboard");
            const nav = [
                {id:"dashboard",i:"🏠",l:"Início"},
                {id:"journey",i:"🗺️",l:"Trilhas 90D"},
                {id:"sql",i:"🗄️",l:"SQL Sandbox"}
            ];

            return (
                <div style={{display:"flex",minHeight:"100vh"}}>
                    <aside style={{width:250,background:C.surface,padding:25,borderRight:`1px solid ${C.border}`, position:"fixed", height:"100vh"}}>
                        <h2 style={{fontFamily:"'Syne'",color:C.accent,marginBottom:40, letterSpacing:"-1px"}}>DATAPATH ⚡</h2>
                        <nav style={{display:"flex",flexDirection:"column",gap:10}}>
                            {nav.map(n => (
                                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                                    textAlign:"left",padding:15,borderRadius:12,background:page===n.id?C.accent+"20":"none",
                                    border:"none",color:page===n.id?C.accent:C.muted,cursor:"pointer",fontWeight:700, fontSize:16, transition:"0.2s"
                                }}>{n.i} {n.l}</button>
                            ))}
                        </nav>
                    </aside>
                    <main style={{flex:1, marginLeft:250, padding:40, overflowY:"auto"}}>
                        {page==="dashboard" && <Dashboard go={setPage}/>}
                        {page==="journey" && <Journey />}
                        {page==="sql" && <SQLConsole />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthProvider><ProgressProvider><AppShell /></ProgressProvider></AuthProvider>);
    </script>
</body>
</html>
