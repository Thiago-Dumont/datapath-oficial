<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPath — Especialista em Dados (90 Dias)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020817; color: #e2e8f0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020817; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3); }
        
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 14px; color: #a5f3fc; margin: 15px 0; border: 1px solid #1e293b; }
        code { color: #f472b6; }
        
        .lesson-content h1, .lesson-content h2 { font-family: 'Syne'; margin-bottom: 15px; color: #fff; }
        .lesson-content p { line-height: 1.8; margin-bottom: 15px; color: #94a3b8; }
        .lesson-content ul { margin-left: 20px; margin-bottom: 15px; color: #94a3b8; }
        .lesson-content li { margin-bottom: 8px; }

        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

        // ============================================================
        // SISTEMA CORE (PERSISTÊNCIA E SEGURANÇA)
        // ============================================================

        const Security = {
            sanitize: (s) => typeof s === "string" ? s.replace(/[<>&"']/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#x27;"}[c])) : "",
            generateUID: () => Math.random().toString(36).substr(2, 9)
        };

        const DB = {
            g: (k) => JSON.parse(localStorage.getItem("dp_v3_"+k) || "null"),
            s: (k,v) => localStorage.setItem("dp_v3_"+k, JSON.stringify(v)),
            progress: (id) => DB.g("prog_"+id) || {
                xp: 0, level: 1, 
                completedPython: [], completedSQL: [], completedPBI: [],
                lastStudy: null
            },
            setProgress: (id, p) => DB.s("prog_"+id, p)
        };

        const calcLevel = (xp) => Math.floor(Math.sqrt(xp/100))+1;

        // ============================================================
        // CONTEÚDO DIDÁTICO EXPANDIDO (90 DIAS x 3 TRILHAS)
        // ============================================================

        const CURRICULUM = {
            python: {
                d1: {
                    title: "Introdução e Ambiente",
                    topics: [
                        { t: "O que é Python?", c: "<h1>O que é Python?</h1><p>Python é uma linguagem de alto nível, interpretada e de tipagem dinâmica. Criada por Guido van Rossum em 1991, seu foco principal é a <b>legibilidade do código</b>.</p><p>Na área de dados, ela é a rainha devido a bibliotecas como Pandas e Scikit-Learn.</p>" },
                        { t: "Instalação do VS Code", c: "<h2>Configurando o Ambiente</h2><p>1. Baixe o VS Code.<br/>2. Instale a extensão do Python da Microsoft.<br/>3. Instale o Python via python.org.</p><pre>python --version</pre>" },
                        { t: "Seu primeiro script", c: "<h2>Hello Data!</h2><p>Crie um arquivo chamado <code>app.py</code> e digite:</p><pre>nome = 'Analista'\nprint(f'Olá, {nome}!')</pre>" }
                    ]
                },
                d2: {
                    title: "Variáveis e Tipos",
                    topics: [
                        { t: "Tipos Primitivos", c: "<h1>Tipos Primitivos</h1><p>Python possui 4 tipos básicos:</p><ul><li><b>int:</b> Números inteiros (10, -5)</li><li><b>float:</b> Decimais (10.5, 3.14)</li><li><b>str:</b> Textos ('Dados')</li><li><b>bool:</b> Verdadeiro ou Falso (True, False)</li></ul>" },
                        { t: "Manipulação de Strings", c: "<h2>Strings</h2><p>Podemos concatenar e formatar:</p><pre>print('Dados'.upper())\nprint('Python'.replace('P', 'J'))</pre>" }
                    ]
                },
                // ... (O gerador abaixo preencherá os 90 dias dinamicamente para manter o código funcional)
            },
            sql: {
                d1: {
                    title: "Bancos de Dados Relacionais",
                    topics: [
                        { t: "O que é um SGBD?", c: "<h1>SGBD</h1><p>Sistema Gerenciador de Banco de Dados. Exemplos: PostgreSQL, MySQL, SQL Server.</p>" },
                        { t: "Modelo Relacional", c: "<h2>Tabelas e Colunas</h2><p>Dados são organizados em tabelas (entidades) com linhas (registros) e colunas (atributos).</p>" }
                    ]
                }
            },
            powerbi: {
                d1: {
                    title: "O Ecossistema Microsoft BI",
                    topics: [
                        { t: "Power BI Desktop vs Service", c: "<h1>Interface</h1><p>O Desktop é onde criamos o relatório. O Service é onde compartilhamos na nuvem.</p>" }
                    ]
                }
            }
        };

        // Gerador de preenchimento para garantir que todos os 90 dias existam
        const generateRemainingDays = (cur) => {
            ["python", "sql", "powerbi"].forEach(track => {
                for(let i=1; i<=90; i++){
                    if(!cur[track]["d"+i]) {
                        cur[track]["d"+i] = {
                            title: `Fase ${i <= 30 ? 'I' : i <= 60 ? 'II' : 'III'}: Evolução Dia ${i}`,
                            topics: [
                                { t: `Conceitos do Dia ${i}`, c: `<h2>Conteúdo do Dia ${i}</h2><p>Nesta etapa da trilha de ${track}, focamos na consolidação dos conhecimentos práticos.</p>` },
                                { t: `Exercício Prático`, c: `<p>Aplique o que aprendeu hoje em um dataset fictício.</p><pre># Exemplo de código para o dia ${i}\nprint('Praticando...')</pre>` }
                            ]
                        };
                    }
                }
            });
            return cur;
        };
        const FULL_CURRICULUM = generateRemainingDays(CURRICULUM);

        // ============================================================
        // COMPONENTES DE INTERFACE (UI)
        // ============================================================

        const AuthCtx = createContext(null);
        const ProgCtx = createContext(null);

        const Badge = ({text, color="#6366f1"}) => (
            <span style={{background: color+"22", color, padding: "4px 12px", borderRadius: "99px", fontSize: "12px", fontWeight: "700", border: `1px solid ${color}44`}}>
                {text}
            </span>
        );

        const ProgressBar = ({now, total, color}) => (
            <div style={{width: "100%", background: "#1e293b", height: "8px", borderRadius: "10px", marginTop: "8px"}}>
                <div style={{width: `${(now/total)*100}%`, background: color, height: "100%", borderRadius: "10px", transition: "0.5s ease"}} />
            </div>
        );

        // ============================================================
        // PÁGINAS PRINCIPAIS
        // ============================================================

        function Dashboard({setPage}) {
            const {progress} = useContext(ProgCtx);
            if(!progress) return null;

            const stats = [
                { label: "Python", val: progress.completedPython.length, color: "#3b82f6" },
                { label: "SQL", val: progress.completedSQL.length, color: "#10b981" },
                { label: "Power BI", val: progress.completedPBI.length, color: "#f59e0b" }
            ];

            return (
                <div className="animate-slide">
                    <header style={{marginBottom: "40px"}}>
                        <h1 style={{fontFamily: "'Syne'", fontSize: "36px"}}>Bem-vindo, Cientista de Dados</h1>
                        <p style={{color: "#94a3b8"}}>Seu progresso é salvo automaticamente neste dispositivo.</p>
                    </header>

                    <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "20px", marginBottom: "40px"}}>
                        <div className="glass" style={{padding: "30px", borderRadius: "20px"}}>
                            <h3>Nível {progress.level}</h3>
                            <div style={{fontSize: "48px", fontWeight: "900", color: "#6366f1", margin: "10px 0"}}>{progress.xp} <span style={{fontSize: "18px", color: "#64748b"}}>XP</span></div>
                            <button onClick={() => setPage("journey")} style={{width: "100%", padding: "12px", borderRadius: "10px", background: "#6366f1", color: "#fff", border: "none", cursor: "pointer", fontWeight: "700"}}>Continuar Estudando</button>
                        </div>
                        
                        <div className="glass" style={{padding: "30px", borderRadius: "20px"}}>
                            <h3>Progresso Geral</h3>
                            <div style={{marginTop: "20px"}}>
                                {stats.map(s => (
                                    <div key={s.label} style={{marginBottom: "15px"}}>
                                        <div style={{display: "flex", justifyContent: "space-between", fontSize: "14px"}}>
                                            <span>{s.label}</span>
                                            <span>{s.val}/90 dias</span>
                                        </div>
                                        <ProgressBar now={s.val} total={90} color={s.color} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Journey() {
            const {progress, completeDay} = useContext(ProgCtx);
            const [track, setTrack] = useState("python");
            const [selectedDay, setSelectedDay] = useState(null);
            const [activeTopic, setActiveTopic] = useState(null);

            if(!progress) return null;

            const completedList = track === "python" ? progress.completedPython : track === "sql" ? progress.completedSQL : progress.completedPBI;
            const currentDayNumber = completedList.length + 1;

            const handleComplete = () => {
                completeDay(track, selectedDay.day);
                setSelectedDay(null);
                setActiveTopic(null);
            };

            // Se um dia foi selecionado, mostra os tópicos e conteúdo
            if (selectedDay) {
                const dayData = FULL_CURRICULUM[track]["d"+selectedDay.day];
                return (
                    <div className="animate-slide" style={{maxWidth: "900px", margin: "0 auto"}}>
                        <button onClick={() => {setSelectedDay(null); setActiveTopic(null);}} style={{background: "none", border: "none", color: "#6366f1", cursor: "pointer", marginBottom: "20px", fontWeight: "700"}}>← Voltar ao Mapa</button>
                        
                        <div style={{display: "grid", gridTemplateColumns: "300px 1fr", gap: "30px"}}>
                            {/* Lista de Tópicos */}
                            <aside>
                                <div className="glass" style={{borderRadius: "15px", overflow: "hidden"}}>
                                    <div style={{padding: "15px", background: "rgba(255,255,255,0.05)", borderBottom: "1px solid rgba(255,255,255,0.1)"}}>
                                        <h4 style={{fontSize: "14px", textTransform: "uppercase", letterSpacing: "1px"}}>Tópicos do Dia {selectedDay.day}</h4>
                                    </div>
                                    {dayData.topics.map((t, idx) => (
                                        <div 
                                            key={idx} 
                                            onClick={() => setActiveTopic(t)}
                                            style={{
                                                padding: "15px", cursor: "pointer", fontSize: "15px",
                                                background: activeTopic?.t === t.t ? "#6366f122" : "transparent",
                                                borderLeft: activeTopic?.t === t.t ? "4px solid #6366f1" : "4px solid transparent",
                                                transition: "0.2s"
                                            }}
                                        >
                                            {t.t}
                                        </div>
                                    ))}
                                </div>

                                {!completedList.includes(selectedDay.day) && (
                                    <button 
                                        onClick={handleComplete}
                                        style={{width: "100%", marginTop: "20px", padding: "15px", borderRadius: "10px", background: "#10b981", color: "#fff", border: "none", fontWeight: "700", cursor: "pointer"}}
                                    >
                                        Marcar Dia como Concluído
                                    </button>
                                )}
                            </aside>

                            {/* Conteúdo da Aula */}
                            <main className="glass" style={{padding: "40px", borderRadius: "20px", minHeight: "500px"}}>
                                {activeTopic ? (
                                    <div className="lesson-content animate-slide" dangerouslySetInnerHTML={{__html: activeTopic.c}} />
                                ) : (
                                    <div style={{textAlign: "center", color: "#64748b", marginTop: "100px"}}>
                                        <div style={{fontSize: "50px", marginBottom: "20px"}}>📖</div>
                                        <h3>Selecione um tópico ao lado para iniciar a aula.</h3>
                                    </div>
                                )}
                            </main>
                        </div>
                    </div>
                );
            }

            return (
                <div className="animate-slide">
                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "40px"}}>
                        <h2 style={{fontFamily: "'Syne'", fontSize: "28px"}}>Trilha de Especialização</h2>
                        <div style={{display: "flex", gap: "10px", background: "#0a1628", padding: "5px", borderRadius: "12px", border: "1px solid #1e293b"}}>
                            <button onClick={() => setTrack("python")} style={{padding: "8px 20px", borderRadius: "8px", border: "none", cursor: "pointer", background: track === "python" ? "#3b82f6" : "transparent", color: "#fff", fontWeight: "700"}}>Python</button>
                            <button onClick={() => setTrack("sql")} style={{padding: "8px 20px", borderRadius: "8px", border: "none", cursor: "pointer", background: track === "sql" ? "#10b981" : "transparent", color: "#fff", fontWeight: "700"}}>SQL</button>
                            <button onClick={() => setTrack("powerbi")} style={{padding: "8px 20px", borderRadius: "8px", border: "none", cursor: "pointer", background: track === "powerbi" ? "#f59e0b" : "transparent", color: "#fff", fontWeight: "700"}}>Power BI</button>
                        </div>
                    </div>

                    <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: "15px"}}>
                        {Array.from({length: 90}, (_, i) => {
                            const d = i + 1;
                            const isDone = completedList.includes(d);
                            const isLocked = d > currentDayNumber;
                            const color = track === "python" ? "#3b82f6" : track === "sql" ? "#10b981" : "#f59e0b";

                            return (
                                <div 
                                    key={d} 
                                    onClick={() => !isLocked && setSelectedDay({day: d})}
                                    className="card-hover"
                                    style={{
                                        aspectRatio: "1/1", borderRadius: "18px", padding: "15px",
                                        background: isDone ? color : isLocked ? "#0a1628" : "#0f172a",
                                        border: `1px solid ${isDone ? color : "#1e293b"}`,
                                        cursor: isLocked ? "not-allowed" : "pointer",
                                        display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center",
                                        opacity: isLocked ? 0.4 : 1, color: isDone ? "#000" : "#fff"
                                    }}
                                >
                                    <div style={{fontSize: "10px", fontWeight: "800", opacity: 0.6}}>DIA</div>
                                    <div style={{fontSize: "24px", fontWeight: "900"}}>{d}</div>
                                    {isDone && <div style={{fontSize: "12px"}}>✓</div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ============================================================
        // APP SHELL
        // ============================================================

        function App() {
            const [page, setPage] = useState("dashboard");
            const [progress, setProgress] = useState(null);
            const user = { id: "master-user" };

            useEffect(() => {
                setProgress(DB.progress(user.id));
            }, []);

            const completeDay = (track, dayNum) => {
                const key = track === "python" ? "completedPython" : track === "sql" ? "completedSQL" : "completedPBI";
                if(progress[key].includes(dayNum)) return;
                
                const newProgress = {
                    ...progress,
                    [key]: [...progress[key], dayNum],
                    xp: progress.xp + 50,
                    lastStudy: new Date().toISOString()
                };
                newProgress.level = calcLevel(newProgress.xp);
                setProgress(newProgress);
                DB.setProgress(user.id, newProgress);
            };

            return (
                <ProgCtx.Provider value={{progress, completeDay}}>
                    <div style={{display: "flex", minHeight: "100vh"}}>
                        {/* Sidebar */}
                        <aside style={{width: "280px", background: "#0a1628", padding: "40px 30px", borderRight: "1px solid #1e293b", position: "fixed", height: "100vh"}}>
                            <h2 style={{fontFamily: "'Syne'", color: "#6366f1", marginBottom: "50px", letterSpacing: "-1px"}}>DATAPATH ⚡</h2>
                            
                            <nav style={{display: "flex", flexDirection: "column", gap: "10px"}}>
                                <button onClick={() => setPage("dashboard")} style={{textAlign: "left", padding: "15px", borderRadius: "12px", border: "none", background: page === "dashboard" ? "#6366f115" : "transparent", color: page === "dashboard" ? "#6366f1" : "#64748b", cursor: "pointer", fontWeight: "700", transition: "0.2s"}}>🏠 Dashboard</button>
                                <button onClick={() => setPage("journey")} style={{textAlign: "left", padding: "15px", borderRadius: "12px", border: "none", background: page === "journey" ? "#6366f115" : "transparent", color: page === "journey" ? "#6366f1" : "#64748b", cursor: "pointer", fontWeight: "700", transition: "0.2s"}}>🗺️ Trilhas 90D</button>
                            </nav>

                            <div style={{position: "absolute", bottom: "40px", width: "220px"}}>
                                <div className="glass" style={{padding: "15px", borderRadius: "15px", fontSize: "12px"}}>
                                    <div style={{color: "#64748b", marginBottom: "5px"}}>Status do Perfil</div>
                                    <div style={{fontWeight: "700"}}>Sincronizado Localmente</div>
                                </div>
                            </div>
                        </aside>

                        {/* Main */}
                        <main style={{flex: 1, marginLeft: "280px", padding: "60px"}}>
                            {page === "dashboard" && <Dashboard setPage={setPage} />}
                            {page === "journey" && <Journey />}
                        </main>
                    </div>
                </ProgCtx.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
