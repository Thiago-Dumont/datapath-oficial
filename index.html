<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPath — Plataforma Gamificada de Dados</title>
    <!-- Bibliotecas Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020817; color: #e2e8f0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020817; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        code { background: #1e293b; padding: 2px 5px; border-radius: 4px; color: #818cf8; font-family: monospace; }
        pre { background: #0a1628; padding: 15px; border-radius: 10px; border: 1px solid #1e293b; color: #34d399; font-family: monospace; overflow-x: auto; margin: 10px 0; }
        a { color: #6366f1; text-decoration: none; font-weight: 700; }
        a:hover { text-decoration: underline; }
        input:focus, textarea:focus, select:focus { outline: none !important; border-color: #6366f1 !important; box-shadow: 0 0 0 3px #6366f115; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

        // ── BANCO DE DADOS E GAMIFICAÇÃO ───────────────────────────
        const DB = {
            g: (k) => { try { return JSON.parse(localStorage.getItem("dp_"+k)||"null"); } catch { return null; }},
            s: (k,v) => { try { localStorage.setItem("dp_"+k, JSON.stringify(v)); } catch {} },
            progress: (id) => DB.g("prog_"+id) || {userId:id, xp:0, level:1, streak:0, completedDays:[], trackProgress:{python:0,sql:0}},
            setProgress: (id,p) => DB.s("prog_"+id, p),
            notes: (id) => DB.g("notes_"+id) || [],
            setNotes: (id,n) => DB.s("notes_"+id, n),
        };

        const calcLevel = (xp) => Math.floor(Math.sqrt(xp/100))+1;
        const xpForLevel = (lvl) => (lvl-1)*(lvl-1)*100;
        const xpForNext = (lvl) => lvl*lvl*100;

        const PHASES = [
            {id:1,name:"Fase 1: Fundamentos",range:[1,30],color:"#3b82f6",icon:"🌱"},
            {id:2,name:"Fase 2: Prática Guiada",range:[31,60],color:"#10b981",icon:"⚡"}
        ];

        // ── DAY_DATA COM CONTEÚDO E LINKS (QA ENRICHED) ──────────────
        const DAY_DATA = [
            {
                day: 1,
                title: "Bem-vindo à Jornada de Dados!",
                phase: 1,
                xp: 50,
                track: "python",
                mission: "Configure seu ambiente de trabalho profissional.",
                tasks: ["Instale o VS Code", "Configure o Python 3", "Crie sua conta no GitHub"],
                guide: (
                    <div>
                        <p>Para ser um Analista de Dados, você precisa de ferramentas sólidas. O <strong>VS Code</strong> é o editor mais usado no mundo.</p>
                        <pre># Verifique se o Python está instalado no terminal:&#10;python --version</pre>
                    </div>
                ),
                links: [
                    { label: "Download VS Code", url: "https://code.visualstudio.com/" },
                    { label: "Download Python Official", url: "https://www.python.org/downloads/" }
                ]
            },
            {
                day: 2,
                title: "Python: Variáveis e Tipos",
                phase: 1,
                xp: 60,
                track: "python",
                mission: "Domine os 4 tipos de dados primitivos do Python.",
                tasks: ["Estude int, str, float, bool", "Crie variáveis dos 4 tipos", "Pratique type() e print()", "Resolva 3 exercícios"],
                guide: (
                    <div>
                        <p>Variáveis são como "caixas" que guardam dados. Em Python, você não precisa dizer o tipo, ele descobre sozinho.</p>
                        <ul>
                            <li><strong>int:</strong> Números inteiros (Ex: <code>idade = 25</code>)</li>
                            <li><strong>float:</strong> Números com vírgula/ponto (Ex: <code>preco = 19.90</code>)</li>
                            <li><strong>str (string):</strong> Textos entre aspas (Ex: <code>nome = "Dados"</code>)</li>
                            <li><strong>bool:</strong> Verdadeiro ou Falso (Ex: <code>pago = True</code>)</li>
                        </ul>
                        <pre># Exemplo Prático:&#10;nome = "Thiago"&#10;xp = 100&#10;print(type(nome)) # Saída: &lt;class 'str'&gt;</pre>
                    </div>
                ),
                links: [
                    { label: "W3Schools: Python Data Types", url: "https://www.w3schools.com/python/python_datatypes.asp" },
                    { label: "Documentação: Introdução ao Python", url: "https://docs.python.org/pt-br/3/tutorial/introduction.html" }
                ]
            },
            {
                day: 3,
                title: "Python: Operadores e Lógica",
                phase: 1,
                xp: 60,
                track: "python",
                mission: "Aprenda a fazer cálculos e comparações no código.",
                tasks: ["Operadores + - * /", "Operadores de Comparação == != >", "Operadores Lógicos and / or"],
                guide: (
                    <div>
                        <p>Operadores permitem manipular variáveis para gerar resultados.</p>
                        <pre>a = 10&#10;b = 3&#10;soma = a + b&#10;print(f"O resultado é {soma}")</pre>
                    </div>
                ),
                links: [
                    { label: "Guia: Operadores Python", url: "https://www.w3schools.com/python/python_operators.asp" }
                ]
            }
        ];

        // ── CONTEXTOS ───────────────────────────────────────────────
        const ProgCtx = createContext(null);
        const FIXED_USER_ID = "master-coder";

        function ProgressProvider({children}) {
            const [progress, setProgress] = useState(DB.progress(FIXED_USER_ID));

            const save = (upd) => {
                const updated = { ...progress, ...upd };
                updated.level = calcLevel(updated.xp);
                DB.setProgress(FIXED_USER_ID, updated);
                setProgress(updated);
            };

            const completeDay = (dayNum, xp) => {
                if(progress.completedDays.includes(dayNum)) return;
                save({
                    completedDays: [...progress.completedDays, dayNum],
                    xp: progress.xp + xp,
                    streak: progress.streak + 1
                });
            };

            return <ProgCtx.Provider value={{progress, save, completeDay}}>{children}</ProgCtx.Provider>;
        }

        // ── UI COMPONENTS ────────────────────────────────────────────
        const C = { bg:"#020817", surface:"#0a1628", card:"#0f172a", border:"#1e293b", accent:"#6366f1", muted:"#64748b", green:"#10b981", yellow:"#f59e0b" };

        const Card = ({children, sx={}}) => <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:22, ...sx}}>{children}</div>;
        const Badge = ({text, color=C.accent}) => <span style={{background:color+"22", color, padding:"4px 10px", borderRadius:999, fontSize:11, fontWeight:700, border:`1px solid ${color}44`}}>{text}</span>;
        const Btn = ({children, onClick, v="primary", sx={}}) => (
            <button onClick={onClick} style={{
                padding:"12px 24px", borderRadius:10, border:"none", fontWeight:700, cursor:"pointer",
                background: v==="primary" ? "linear-gradient(135deg,#6366f1,#8b5cf6)" : C.surface, color:"#fff", ...sx
            }}>{children}</button>
        );

        // ── DASHBOARD ────────────────────────────────────────────────
        function Dashboard({go}) {
            const {progress} = useContext(ProgCtx);
            const pct = Math.round((progress.completedDays.length / 90) * 100);
            return (
                <div style={{maxWidth:1000, margin:"0 auto", display:"flex", flexDirection:"column", gap:20, animation:"fadeIn 0.5s"}}>
                    <div style={{background:"linear-gradient(135deg,#1e1b4b,#1a2744)", borderRadius:18, padding:30, border:`1px solid ${C.border}`}}>
                        <h2 style={{fontFamily:"'Syne'", fontSize:32, marginBottom:10}}>Olá, Aluno! ⚡</h2>
                        <p style={{color:C.muted}}>Seu progresso na trilha de dados: <strong>{pct}%</strong> concluído.</p>
                        <div style={{display:"flex", gap:10, marginTop:20}}>
                            <Btn onClick={()=>go("journey")}>🗺️ Ir para Missões</Btn>
                            <Btn v="secondary" onClick={()=>go("profile")}>💾 Salvar Backup</Btn>
                        </div>
                    </div>
                    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:15}}>
                        <Card><h4>Nível {progress.level}</h4><p style={{fontSize:24, fontWeight:900, color:C.accent}}>{progress.xp} XP</p></Card>
                        <Card><h4>Sequência</h4><p style={{fontSize:24, fontWeight:900, color:C.yellow}}>🔥 {progress.streak} dias</p></Card>
                        <Card><h4>Missões</h4><p style={{fontSize:24, fontWeight:900, color:C.green}}>{progress.completedDays.length} / 90</p></Card>
                    </div>
                </div>
            );
        }

        // ── JOURNEY (SISTEMA DE APRENDIZADO INTEGRADO) ───────────────
        function Journey() {
            const {progress, completeDay} = useContext(ProgCtx);
            const [sel, setSel] = useState(null);
            const curDay = progress.completedDays.length + 1;

            if (sel) return (
                <div style={{maxWidth:800, margin:"0 auto", animation:"fadeIn 0.3s"}}>
                    <button onClick={()=>setSel(null)} style={{background:"none", border:"none", color:C.accent, cursor:"pointer", marginBottom:20, fontWeight:700}}>← VOLTAR PARA O MAPA</button>
                    <Card sx={{border:`1px solid ${C.accent}44`}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:20}}>
                            <Badge text={`DIA ${sel.day}`} />
                            <Badge text={`+${sel.xp} XP`} color={C.green} />
                        </div>
                        <h2 style={{fontFamily:"'Syne'", fontSize:28, marginBottom:20}}>{sel.title}</h2>
                        
                        <div style={{marginBottom:30}}>
                            <h4 style={{color:C.accent, marginBottom:10, textTransform:"uppercase", fontSize:13}}>🎯 Objetivo da Missão</h4>
                            <p style={{fontSize:16, lineHeight:1.7}}>{sel.mission}</p>
                        </div>

                        <div style={{marginBottom:30, background:C.surface, padding:20, borderRadius:12}}>
                            <h4 style={{color:C.yellow, marginBottom:15, textTransform:"uppercase", fontSize:13}}>📖 Material de Estudo</h4>
                            <div style={{lineHeight:1.8}}>{sel.guide}</div>
                        </div>

                        <div style={{marginBottom:30}}>
                            <h4 style={{color:C.accent, marginBottom:15, textTransform:"uppercase", fontSize:13}}>✅ Microtarefas do Dia</h4>
                            {sel.tasks.map((t, i) => (
                                <div key={i} style={{display:"flex", alignItems:"center", gap:10, marginBottom:10, background:"#ffffff05", padding:10, borderRadius:8}}>
                                    <div style={{width:20, height:20, border:`2px solid ${C.accent}`, borderRadius:4}} />
                                    <span>{t}</span>
                                </div>
                            ))}
                        </div>

                        <div style={{marginBottom:30}}>
                            <h4 style={{color:C.accent, marginBottom:10, textTransform:"uppercase", fontSize:13}}>🔗 Recursos Externos</h4>
                            <div style={{display:"flex", flexDirection:"column", gap:8}}>
                                {sel.links.map((l, i) => (
                                    <a key={i} href={l.url} target="_blank" rel="noreferrer">🌍 {l.label}</a>
                                ))}
                            </div>
                        </div>

                        {progress.completedDays.includes(sel.day) 
                            ? <div style={{background:C.green+"22", color:C.green, padding:20, borderRadius:12, textAlign:"center", fontWeight:800}}>MISSÃO CUMPRIDA! VOCÊ JÁ GANHOU ESTE XP.</div>
                            : <Btn sx={{width:"100%", fontSize:18}} onClick={()=>{completeDay(sel.day, sel.xp); setSel(null);}}>CONCLUIR MISSÃO E GANHAR XP</Btn>
                        }
                    </Card>
                </div>
            );

            return (
                <div style={{animation:"fadeIn 0.5s"}}>
                    <h2 style={{fontFamily:"'Syne'", marginBottom:30}}>Mapa da Jornada 90 Dias</h2>
                    <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))", gap:15}}>
                        {DAY_DATA.map(d => {
                            const done = progress.completedDays.includes(d.day);
                            const locked = d.day > curDay;
                            return (
                                <div key={d.day} onClick={()=> !locked && setSel(d)} style={{
                                    padding:20, borderRadius:16, textAlign:"center", cursor:locked ? "not-allowed" : "pointer",
                                    background: done ? C.green+"11" : locked ? C.surface : C.card,
                                    border: `2px solid ${done ? C.green : locked ? C.border : C.accent}`,
                                    opacity: locked ? 0.4 : 1, transition: "0.2s"
                                }}>
                                    <div style={{fontSize:11, color:C.muted, fontWeight:800}}>DIA</div>
                                    <div style={{fontSize:28, fontWeight:900, margin:"5px 0"}}>{d.day}</div>
                                    {done ? <Badge text="OK" color={C.green} /> : locked ? <span>🔒</span> : <Badge text="LIVE" color={C.accent} />}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── PROFILE (BACKUP) ────────────────────────────────────────
        function Profile() {
            const {progress} = useContext(ProgCtx);
            const exportBackup = () => {
                const data = { progress, timestamp: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `datapath_backup.json`;
                a.click();
            };
            return (
                <div style={{maxWidth:600, margin:"0 auto", animation:"fadeIn 0.5s"}}>
                    <Card sx={{textAlign:"center"}}>
                        <h2 style={{fontFamily:"'Syne'", marginBottom:20}}>💾 Gerenciar Progresso</h2>
                        <p style={{color:C.muted, marginBottom:30}}>Seu progresso é salvo no navegador. Para não perder seus dados ao trocar de computador, baixe seu backup.</p>
                        <Btn onClick={exportBackup}>📥 Baixar Arquivo de Backup (.json)</Btn>
                    </Card>
                </div>
            );
        }

        // ── APP SHELL ────────────────────────────────────────────────
        function AppShell() {
            const [page, setPage] = useState("dashboard");
            const nav = [
                {id:"dashboard", i:"🏠", l:"Dashboard"},
                {id:"journey", i:"🗺️", l:"Jornada"},
                {id:"profile", i:"💾", l:"Backup"}
            ];
            return (
                <div style={{display:"flex", minHeight:"100vh"}}>
                    <aside style={{width:260, background:C.surface, padding:25, borderRight:`1px solid ${C.border}`, position:"fixed", height:"100vh"}}>
                        <h2 style={{fontFamily:"'Syne'", color:C.accent, fontSize:24, marginBottom:40, letterSpacing:-1}}>DATAPATH ⚡</h2>
                        <nav style={{display:"flex", flexDirection:"column", gap:10}}>
                            {nav.map(n => (
                                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                                    textAlign:"left", padding:14, borderRadius:12, background: page === n.id ? C.accent+"22" : "none",
                                    border:"none", color: page === n.id ? C.accent : C.muted, cursor:"pointer", fontWeight:700, fontSize:15
                                }}>{n.i} &nbsp; {n.l}</button>
                            ))}
                        </nav>
                    </aside>
                    <main style={{flex:1, padding:40, marginLeft:260}}>
                        {page === "dashboard" && <Dashboard go={setPage} />}
                        {page === "journey" && <Journey />}
                        {page === "profile" && <Profile />}
                    </main>
                </div>
            );
        }

        // ── RENDER ──────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProgressProvider><AppShell /></ProgressProvider>);
    </script>
</body>
</html>
