        function runSQL(q) {
            const ql = q.toLowerCase().trim();
            if (!ql.startsWith("select")) return {error:"Apenas SELECT é permitido no sandbox."};
            let rows = [];
            if (ql.includes("from produtos")) rows = [...TABLES.produtos];
            else if (ql.includes("from vendas")) rows = [...TABLES.vendas];
            else if (ql.includes("from clientes")) rows = [...TABLES.clientes];
            else return {error:"Tabelas: produtos, vendas, clientes"};
            const wm = ql.match(/where (.+?)(?:order by|group by|limit|having|$)/);
            if (wm) {
                const wc = wm[1].trim();
                if (wc.includes("preco >")) { const v=parseInt(wc.match(/preco > (\d+)/)?.[1]||0); rows=rows.filter(r=>r.preco>v); }
                if (wc.includes("preco <")) { const v=parseInt(wc.match(/preco < (\d+)/)?.[1]||0); rows=rows.filter(r=>r.preco<v); }
                if (wc.includes("valor >")) { const v=parseInt(wc.match(/valor > (\d+)/)?.[1]||0); rows=rows.filter(r=>r.valor>v); }
                if (wc.includes("categoria = ")) { const v=wc.match(/categoria = '([^']+)'/)?.[1]; if(v) rows=rows.filter(r=>r.categoria===v); }
                if (wc.includes("plano = ")) { const v=wc.match(/plano = '([^']+)'/)?.[1]; if(v) rows=rows.filter(r=>r.plano===v); }
            }
            if (ql.includes("group by")) {
                const gb = ql.match(/group by (\w+)/)?.[1];
                if (gb) {
                    const grouped = {};
                    rows.forEach(r => { const k=r[gb]; if(!grouped[k]) grouped[k]={[gb]:k,count:0,total:0}; grouped[k].count++; grouped[k].total+=(r.valor||r.preco||0); });
                    rows = Object.values(grouped).map(g=>({[gb]:g[gb],"COUNT(*)":g.count,"SUM(valor/preco)":g.total}));
                }
            }
            if (ql.includes("order by")) {
                const ob = ql.match(/order by (\w+)(?: (asc|desc))?/);
                if (ob) { const [,col,dir="asc"]=ob; rows=[...rows].sort((a,b)=>{const va=a[col]||0,vb=b[col]||0;return dir==="desc"?vb-va:va-vb;}); }
            }
            const lm = ql.match(/limit (\d+)/);
            if (lm) rows = rows.slice(0, parseInt(lm[1]));
            if (ql.includes("count(*)") && !ql.includes("group by")) return {rows:[{"count(*)":rows.length}],count:1};
            if (ql.match(/sum\((\w+)\)/) && !ql.includes("group by")) {
                const col = ql.match(/sum\((\w+)\)/)?.[1]; const t=rows.reduce((s,r)=>s+(r[col]||0),0);
                return {rows:[{[`sum(${col})`]:t}],count:1};
            }
            if (ql.match(/avg\((\w+)\)/) && !ql.includes("group by")) {
                const col = ql.match(/avg\((\w+)\)/)?.[1]; const a=rows.reduce((s,r)=>s+(r[col]||0),0)/(rows.length||1);
                return {rows:[{[`avg(${col})`]:parseFloat(a.toFixed(2))}],count:1};
            }
            return {rows, count:rows.length};
        }

        // ── CONTEXTS (MODIFICADO: SEM LOGIN) ───────────────────────

        function AuthProvider({children}) {

        function ProgressProvider({children}) {
            const {user}=useContext(AuthCtx);
            const [progress,setProgress]=useState(null);
            useEffect(()=>{ if(user) setProgress(DB.progress(user.id)); },[user]);

            const save=useCallback((upd)=>{
                if(!user) return null;
                const cur=DB.progress(user.id);
                const updated={...cur,...upd}; updated.level=calcLevel(updated.xp);
                DB.setProgress(user.id,updated); setProgress({...updated}); return updated;
            },[user]);

            const checkAchievements=(prog)=>{
                const ach=[...(prog.achievements||[])]; let bonus=0;
                ACHIEVEMENTS.forEach(a=>{ if(!ach.includes(a.id)&&a.cond(prog)){ach.push(a.id);bonus+=a.xp;} });
                if(bonus>0) save({achievements:ach,xp:prog.xp+bonus});
            };

            const completeDay=useCallback((dayNum,xpAmt)=>{
                if(!user) return;
                const cur=DB.progress(user.id);
                if(cur.completedDays.includes(dayNum)) return;
                const days=[...cur.completedDays,dayNum], newXP=cur.xp+xpAmt;
                const today=new Date().toDateString(), yest=new Date(Date.now()-86400000).toDateString();
                const newStreak=cur.lastStudy===yest?cur.streak+1:cur.lastStudy===today?cur.streak:1;
                const upd=save({completedDays:days,xp:newXP,streak:newStreak,lastStudy:today});
                if(upd) checkAchievements(upd);
            },[user,save]);

            const addXP=useCallback((amt)=>{
                if(!user) return;
                const cur=DB.progress(user.id);
                const upd=save({xp:cur.xp+amt});
                if(upd) checkAchievements(upd);
            },[user,save]);

            return <ProgCtx.Provider value={{progress,save,completeDay,addXP}}>{children}</ProgCtx.Provider>;
        }

        // ── PROFILE (SISTEMA DE BACKUP) ─────────────────────────────
        function ProfilePage() {
            const {progress} = useContext(ProgCtx);
            const {user} = useContext(AuthCtx);

            const exportBackup = () => {
                const data = {
                    progress: DB.progress(user.id),
                    notes: DB.notes(user.id),
                    portfolio: DB.portfolio(user.id),
                    resume: DB.resume(user.id),
                    habits: DB.habits(user.id),
                    checklist: DB.checklist(user.id)
                };
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `datapath_backup_${new Date().toLocaleDateString()}.json`;
                a.click();
            };

            const importBackup = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        DB.setProgress(user.id, data.progress);
                        DB.setNotes(user.id, data.notes);
                        DB.setPortfolio(user.id, data.portfolio);
                        DB.setResume(user.id, data.resume);
                        DB.setHabits(user.id, data.habits);
                        DB.setChecklist(user.id, data.checklist);
                        alert("Progresso restaurado com sucesso! Recarregando...");
                        window.location.reload();
                    } catch { alert("Erro ao ler o arquivo de backup."); }
                };
                reader.readAsText(file);
            };

            return (
                <div style={{maxWidth:800,margin:"0 auto",animation:"fadeIn 0.5s"}}>
                    <Card sx={{textAlign:"center",marginBottom:20}}>
                        <div style={{width:80,height:80,background:C.accent,borderRadius:999,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:40,marginBottom:15}}>👤</div>
                        <h2 style={{fontFamily:"'Syne'"}}>{user.name}</h2>
                        <p style={{color:C.muted}}>Nível {progress?.level} · {progress?.xp} XP</p>
                    </Card>

                    <Card>
                        <h3 style={{fontFamily:"'Syne'",marginBottom:15}}>💾 Salvar e Restaurar</h3>
                        <p style={{color:C.muted,fontSize:14,marginBottom:20}}>Como não usamos login, seu progresso fica salvo apenas neste navegador. Use os botões abaixo para levar seus dados para outro dispositivo.</p>
                        <div style={{display:"flex",flexDirection:"column",gap:15}}>
                            <Btn onClick={exportBackup}>📤 Exportar Backup (Baixar arquivo)</Btn>
                            <div style={{background:C.surface,padding:20,borderRadius:12,border:`1px dashed ${C.border}`}}>
                                <label style={{display:"block",marginBottom:10,fontSize:13,fontWeight:700,color:C.accent}}>📥 IMPORTAR BACKUP:</label>
                                <input type="file" accept=".json" onChange={importBackup} style={{fontSize:12,color:C.muted}} />
                            </div>
                        </div>
                    </Card>
                </div>
            );
        }

                {id:"portfolio",i:"💼",l:"Portfólio"},
                {id:"resume",i:"📄",l:"Currículo ATS"},
                {id:"profile",i:"👤",l:"Perfil / Salvar"},
            ];

            const go=(p)=>{setPage(p);setOpen(false);};

            return (
                <div style={{display:"flex",minHeight:"100vh"}}>
                    {/* Sidebar */}
                    <aside style={{width:240,background:C.surface,borderRight:`1px solid ${C.border}`,padding:20,display:"flex",flexDirection:"column"}}>
                        <h2 style={{fontFamily:"'Syne'",color:C.accent,fontSize:22,marginBottom:30}}>DataPath ⚡</h2>
                        {progress && <XPBar xp={progress.xp} level={progress.level} />}
                        <nav style={{marginTop:30,flex:1,display:"flex",flexDirection:"column",gap:5}}>
                            {nav.map(n=>(
                                <button key={n.id} onClick={()=>go(n.id)}
                                    style={{textAlign:"left",padding:12,borderRadius:10,background:page===n.id?C.accent+"15":"none",border:"none",color:page===n.id?C.accent:C.muted,cursor:"pointer",fontWeight:700,transition:"0.2s"}}>
                                    <span style={{marginRight:10}}>{n.i}</span> {n.l}
                                </button>
                            ))}
                        </nav>
                        <button onClick={logout} style={{background:"none",border:"none",color:C.red,padding:10,textAlign:"left",cursor:"pointer",fontSize:13}}>🚪 Sair</button>
                    </aside>

                    {/* Main Content */}
                    <main style={{flex:1,padding:30,overflowY:"auto",maxHeight:"100vh"}}>
                        {page==="dashboard"&&<Dashboard go={go}/>}
                        {page==="journey"&&<Journey/>}
                        {page==="tracks"&&<Tracks/>}
                        {page==="profile"&&<ProfilePage/>}
                        {page!=="dashboard"&&page!=="journey"&&page!=="tracks"&&page!=="profile"&& (
                            <Card><h2 style={{fontFamily:"'Syne'"}}>Em Construção</h2><p style={{color:C.muted,marginTop:10}}>Esta funcionalidade está sendo portada para o formato sem login.</p></Card>
                        )}
                    </main>
                </div>
            );
        }

        // ── ROOT ──────────────────────────────────────────────────────
        function App() {
            return (
                <AuthProvider>
                    <ProgressProvider>
                        <AppShell />
                    </ProgressProvider>
                </AuthProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
