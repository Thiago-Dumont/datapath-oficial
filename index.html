<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPath — Oficial</title>
    <!-- Bibliotecas Core (React 18 + Babel para tradução em tempo real) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fontes Oficiais -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020817; color: #e2e8f0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020817; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        input:focus, textarea:focus, select:focus { outline: none !important; border-color: #6366f1 !important; box-shadow: 0 0 0 3px #6366f115; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

        // ============================================================
        // DATAPATH — LÓGICA INTEGRAL (SEGURANÇA E PERSISTÊNCIA)
        // ============================================================

        const Security = {
            hashPassword: async (pw) => {
                const data = new TextEncoder().encode(pw + "dp_salt_x9k2");
                const hash = await crypto.subtle.digest("SHA-256", data);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
            },
            sanitize: (s) => typeof s === "string" ? s.replace(/[<>&"']/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#x27;"}[c])) : "",
            validateEmail: (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e),
            validatePassword: (p) => p.length >= 8 && /[A-Z]/.test(p) && /[0-9]/.test(p),
            generateJWT: (uid) => {
                const h = btoa(JSON.stringify({alg:"HS256",typ:"JWT"}));
                const p = btoa(JSON.stringify({sub:uid,iat:Date.now(),exp:Date.now()+86400000}));
                const s = btoa(uid+"dp_secret_key");
                return `${h}.${p}.${s}`;
            },
            verifyJWT: (token) => {
                try { const d = JSON.parse(atob(token.split(".")[1])); return d.exp > Date.now() ? d : null; }
                catch { return null; }
            },
        };

        const RL = { _a: {}, check(k, max=5, win=900000) {
            const now = Date.now();
            this._a[k] = (this._a[k]||[]).filter(t=>now-t<win);
            if (this._a[k].length >= max) return false;
            this._a[k].push(now); return true;
        }};

        const DB = {
            g: (k) => { try { return JSON.parse(localStorage.getItem("dp_"+k)||"null"); } catch { return null; }},
            s: (k,v) => { try { localStorage.setItem("dp_"+k, JSON.stringify(v)); } catch {} },
            users: () => DB.g("users") || {},
            setUsers: (u) => DB.s("users", u),
            progress: (id) => DB.g("prog_"+id) || defProgress(id),
            setProgress: (id,p) => DB.s("prog_"+id, p),
            notes: (id) => DB.g("notes_"+id) || [],
            setNotes: (id,n) => DB.s("notes_"+id, n),
            portfolio: (id) => DB.g("pf_"+id) || [],
            setPortfolio: (id,p) => DB.s("pf_"+id, p),
            resume: (id) => DB.g("cv_"+id) || defResume(),
            setResume: (id,r) => DB.s("cv_"+id, r),
            goals: (id) => DB.g("goals_"+id) || [],
            setGoals: (id,g) => DB.s("goals_"+id, g),
            habits: (id) => DB.g("habits_"+id) || defHabits(),
            setHabits: (id,h) => DB.s("habits_"+id, h),
            checklist: (id) => DB.g("check_"+id) || [],
            setChecklist: (id,c) => DB.s("check_"+id, c),
        };

        const defProgress = (id) => ({
            userId:id, xp:0, level:1, streak:0, lastStudy:null,
            completedDays:[], completedPython:[], completedSQL:[], completedPBI:[], achievements:[], trackProgress:{python:0,sql:0,powerbi:0,english:0}
        });
        const defResume = () => ({
            name:"",title:"",email:"",phone:"",linkedin:"",github:"",
            summary:"",skills:[],experience:[],education:[],projects:[],certifications:[]
        });
        const defHabits = () => ([
            {id:1,name:"Estudar Python",streak:0,done:false,color:"#3b82f6"},
            {id:2,name:"Praticar SQL",streak:0,done:false,color:"#10b981"},
            {id:3,name:"Inglês técnico",streak:0,done:false,color:"#f59e0b"},
            {id:4,name:"Revisão do dia",streak:0,done:false,color:"#8b5cf6"},
        ]);

        const calcLevel = (xp) => Math.floor(Math.sqrt(xp/100))+1;
        const xpForLevel = (lvl) => (lvl-1)*(lvl-1)*100;
        const xpForNext = (lvl) => lvl*lvl*100;

        const ACHIEVEMENTS = [
            {id:"first",name:"Primeiro Passo",desc:"Concluiu o Dia 1",icon:"🌱",xp:50,cond:(p)=>p.completedDays.length>=1},
        ];

        // ============================================================
        // CONTEÚDO DAS TRILHAS (PYTHON, SQL, POWER BI) - 90 DIAS CADA
        // ============================================================

        const TRACK_CONTENT = {
            python: Array.from({length: 90}, (_, i) => ({
                day: i + 1,
                title: i < 30 ? `Python Básico: ${["Variáveis", "Tipos", "Loops", "Funções"][i % 4]}` : i < 60 ? `Python para Dados: ${["Pandas", "NumPy", "Cálculo", "Filtros"][i % 4]}` : `Avançado: ${["Machine Learning", "APIs", "Automação", "Dashboards"][i % 4]}`,
                xp: 50 + (i),
                mission: `Meta do dia ${i+1}: Dominar conceitos de Python aplicados à análise de dados.`,
                tasks: ["Assistir vídeo aula", "Realizar 3 exercícios", "Commit no GitHub"],
                english: "Vocabulário técnico do dia aplicado a Python.",
                practice: "Escreva um script que resolva um problema real de automação."
            })),
            sql: Array.from({length: 90}, (_, i) => ({
                day: i + 1,
                title: i < 30 ? `SQL Fundamentos: ${["SELECT", "WHERE", "JOIN", "GROUP BY"][i % 4]}` : i < 60 ? `SQL Analítico: ${["Window Functions", "CTEs", "Subqueries", "Views"][i % 4]}` : `SQL Performance: ${["Indexação", "Stored Procs", "Particionamento", "Triggers"][i % 4]}`,
                xp: 50 + (i),
                mission: `Meta do dia ${i+1}: Extrair inteligência de bancos de dados relacionais.`,
                tasks: ["Praticar no sandbox", "Resolver desafio do LeetCode", "Desenhar modelo ER"],
                english: "Termos técnicos: Query, Schema, Constraints, Tuning.",
                practice: "Crie uma query complexa unindo 4 tabelas com filtros avançados."
            })),
            powerbi: Array.from({length: 90}, (_, i) => ({
                day: i + 1,
                title: i < 30 ? `PBI Início: ${["ETL", "Power Query", "Modelagem", "Viz"][i % 4]}` : i < 60 ? `DAX Power: ${["CALCULATE", "Time Intelligence", "Measures", "Contexto"][i % 4]}` : `BI Enterprise: ${["RLS", "Gateway", "Dataflow", "Storytelling"][i % 4]}`,
                xp: 50 + (i),
                mission: `Meta do dia ${i+1}: Criar visualizações impactantes e cálculos performáticos.`,
                tasks: ["Limpar dados no Power Query", "Criar medida DAX", "Ajustar layout mobile"],
                english: "Vocabulário: Dashboard, Stakeholder, Insight, KPI.",
                practice: "Crie um Dashboard de vendas do zero com 3 páginas."
            }))
        };

        // SQL SANDBOX DATA
        const TABLES = {
            produtos:[{id:1,nome:"Laptop Pro",categoria:"Tech",preco:3500,estoque:10},{id:2,nome:"Monitor 4K",categoria:"Tech",preco:1200,estoque:25}],
            vendas:[{id:1,produto:"Laptop Pro",vendedor:"Ana",valor:3500,data:"2024-01-15"}],
            clientes:[{id:1,nome:"Carlos Silva",cidade:"São Paulo",plano:"Premium"}]
        };

        function runSQL(q) {
            const ql = q.toLowerCase().trim();
            if (!ql.startsWith("select")) return {error:"Apenas SELECT é permitido no sandbox."};
            let rows = [];
            if (ql.includes("from produtos")) rows = [...TABLES.produtos];
            else if (ql.includes("from vendas")) rows = [...TABLES.vendas];
            else if (ql.includes("from clientes")) rows = [...TABLES.clientes];
            else return {error:"Tabelas disponíveis: produtos, vendas, clientes"};
            return {rows, count:rows.length};
        }

        // ── CONTEXTOS INTEGRADOS ────────────────────────────────────
        const AuthCtx = createContext(null);
        const ProgCtx = createContext(null);
        const FIXED_USER = { id: "master-user", name: "Estudante de Dados" };

        function AuthProvider({children}) {
            const [user] = useState(FIXED_USER);
            const logout=()=>{ alert("Seu progresso é salvo automaticamente."); };
            return <AuthCtx.Provider value={{user,loading:false,logout}}>{children}</AuthCtx.Provider>;
        }

        function ProgressProvider({children}) {
            const {user}=useContext(AuthCtx);
            const [progress,setProgress]=useState(null);
            useEffect(()=>{ if(user) setProgress(DB.progress(user.id)); },[user]);

            const save=useCallback((upd)=>{
                if(!user) return null;
                const cur=DB.progress(user.id);
                const updated={...cur,...upd}; updated.level=calcLevel(updated.xp);
                DB.setProgress(user.id,updated); setProgress({...updated}); return updated;
            },[user]);

            const completeDay=useCallback((track, dayNum, xpAmt)=>{
                if(!user) return;
                const cur=DB.progress(user.id);
                const trackKey = track === 'python' ? 'completedPython' : track === 'sql' ? 'completedSQL' : 'completedPBI';
                if(cur[trackKey].includes(dayNum)) return;
                
                const updatedDays = [...cur[trackKey], dayNum];
                save({ [trackKey]: updatedDays, xp: cur.xp + xpAmt, lastStudy: new Date().toDateString() });
            },[user,save]);

            return <ProgCtx.Provider value={{progress,save,completeDay}}>{children}</ProgCtx.Provider>;
        }

        const useAuth=()=>useContext(AuthCtx);
        const useProgress=()=>useContext(ProgCtx);

        // ── UI PRIMITIVES ──────────────────────────────────
        const C = { bg:"#020817", surface:"#0a1628", card:"#0f172a", border:"#1e293b", text:"#e2e8f0", muted:"#64748b", accent:"#6366f1", yellow:"#f59e0b", red:"#ef4444", green:"#10b981", blue:"#3b82f6" };

        const XPBar = ({xp,level}) => {
            const lo=xpForLevel(level), hi=xpForNext(level);
            const pct=Math.min(100,((xp-lo)/(hi-lo))*100);
            return (
                <div style={{width:"100%"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}><span>Nível {level}</span><span>{xp} XP</span></div>
                    <div style={{background:C.border,borderRadius:999,height:7}}><div style={{width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",height:"100%",borderRadius:999,transition:"width 0.7s"}}/></div>
                </div>
            );
        };

        const Btn = ({children,onClick,v="primary",sx={}}) => {
            const vs={
                primary:{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none"},
                secondary:{background:C.card,color:C.text,border:`1px solid ${C.border}`},
                track:{background:C.surface, color:C.text, border:`1px solid ${C.border}`}
            };
            return <button onClick={onClick} style={{padding:"10px 20px",borderRadius:8,fontWeight:700,cursor:"pointer",...vs[v],...sx}}>{children}</button>;
        };

        const Card = ({children,sx={}}) => <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22,...sx}}>{children}</div>;
        const Badge = ({text,color=C.accent}) => <span style={{background:color+"22",color,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,border:`1px solid ${color}44`}}>{text}</span>;

        // ── PÁGINAS ───────────────────────────────────────

        function Dashboard({go}) {
            const {progress}=useProgress();
            if(!progress) return null;
            return (
                <div style={{maxWidth:1100,margin:"0 auto",display:"flex",flexDirection:"column",gap:20,animation:"fadeIn 0.5s"}}>
                    <div style={{background:"linear-gradient(135deg,#1e1b4b,#1a2744)",border:`1px solid ${C.border}`,borderRadius:18,padding:30}}>
                        <h2 style={{fontFamily:"'Syne'",fontSize:28,marginBottom:10}}>Olá, Cientista! 👋</h2>
                        <p style={{color:C.muted}}>Escolha uma trilha abaixo e comece seus 90 dias de especialização.</p>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px, 1fr))",gap:15}}>
                        <Card><h4>Nível {progress.level}</h4><XPBar xp={progress.xp} level={progress.level}/></Card>
                        <Card><h4>Python</h4><p>{progress.completedPython.length} / 90 dias</p></Card>
                        <Card><h4>SQL</h4><p>{progress.completedSQL.length} / 90 dias</p></Card>
                        <Card><h4>Power BI</h4><p>{progress.completedPBI.length} / 90 dias</p></Card>
                    </div>
                    <Btn onClick={()=>go("journey")}>Ir para as Trilhas</Btn>
                </div>
            );
        }

        function Journey() {
            const {progress,completeDay}=useProgress();
            const [selTrack, setSelTrack] = useState('python');
            const [selDay,setSelDay]=useState(null);

            if(!progress) return null;

            const currentTrackData = TRACK_CONTENT[selTrack];
            const completedList = selTrack === 'python' ? progress.completedPython : selTrack === 'sql' ? progress.completedSQL : progress.completedPBI;

            if(selDay) return (
                <div style={{maxWidth:700,margin:"0 auto",animation:"fadeIn 0.3s"}}>
                    <button onClick={()=>setSelDay(null)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",marginBottom:20}}>← Voltar</button>
                    <Card>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                            <Badge text={`Dia ${selDay.day}`}/>
                            <Badge text={`+${selDay.xp} XP`} color={C.green}/>
                        </div>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>{selDay.title}</h2>
                        <p style={{lineHeight:1.6,marginBottom:20}}>{selDay.mission}</p>
                        <div style={{background:C.surface,padding:15,borderRadius:10,marginBottom:20}}>
                            <h4 style={{marginBottom:10,color:C.accent}}>Microtarefas:</h4>
                            {selDay.tasks.map((t,i)=><div key={i} style={{marginBottom:5}}>• {t}</div>)}
                        </div>
                        <div style={{marginBottom:20, padding:15, borderLeft:`4px solid ${C.yellow}`, background:C.surface}}>
                            <strong>Inglês:</strong> {selDay.english}
                        </div>
                        {completedList.includes(selDay.day) 
                            ? <div style={{color:C.green,fontWeight:800,textAlign:"center"}}>✅ Concluído!</div>
                            : <Btn sx={{width:"100%"}} onClick={()=>{completeDay(selTrack, selDay.day, selDay.xp);setSelDay(null);}}>Marcar como Concluído</Btn>
                        }
                    </Card>
                </div>
            );

            return (
                <div style={{animation:"fadeIn 0.5s"}}>
                    <div style={{display:"flex", gap:10, marginBottom:30}}>
                        <Btn v={selTrack==='python'?'primary':'secondary'} onClick={()=>setSelTrack('python')}>🐍 Python</Btn>
                        <Btn v={selTrack==='sql'?'primary':'secondary'} onClick={()=>setSelTrack('sql')}>🗄️ SQL</Btn>
                        <Btn v={selTrack==='powerbi'?'primary':'secondary'} onClick={()=>setSelTrack('powerbi')}>📊 Power BI</Btn>
                    </div>

                    <h2 style={{fontFamily:"'Syne'",marginBottom:20, textTransform:'capitalize'}}>Trilha {selTrack} (90 dias)</h2>
                    
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:10}}>
                        {currentTrackData.map(d => {
                            const done=completedList.includes(d.day);
                            const locked=d.day > (completedList.length + 1);
                            return (
                                <div key={d.day} onClick={()=>!locked && setSelDay(d)} style={{
                                    padding:15, borderRadius:12, textAlign:"center", cursor:locked?"not-allowed":"pointer",
                                    background:done?C.green+"22":locked?C.surface:C.card,
                                    border:`1px solid ${done?C.green:C.border}`, opacity:locked?0.4:1
                                }}>
                                    <div style={{fontSize:10,color:C.muted}}>DIA</div>
                                    <div style={{fontSize:20,fontWeight:900}}>{d.day}</div>
                                    {done && <div style={{fontSize:10}}>✓</div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function SQLConsole() {
            const [q,setQ]=useState("SELECT * FROM produtos;");
            const [res,setRes]=useState(null);
            return (
                <div style={{maxWidth:900,margin:"0 auto",animation:"fadeIn 0.5s"}}>
                    <Card>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>SQL Sandbox</h2>
                        <textarea value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",height:100,background:"#000",color:C.green,padding:15,fontFamily:"monospace",borderRadius:8,border:"none"}}/>
                        <Btn sx={{marginTop:15}} onClick={()=>setRes(runSQL(q))}>Executar</Btn>
                    </Card>
                    {res && (
                        <Card sx={{marginTop:20,overflowX:"auto"}}>
                            {res.error ? <span style={{color:C.red}}>{res.error}</span> : (
                                <table style={{width:"100%",borderCollapse:"collapse"}}>
                                    <thead><tr>{Object.keys(res.rows[0]||{}).map(k=><th key={k} style={{textAlign:"left",padding:10,borderBottom:`1px solid ${C.border}`}}>{k}</th>)}</tr></thead>
                                    <tbody>{res.rows.map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j} style={{padding:10}}>{String(v)}</td>)}</tr>)}</tbody>
                                </table>
                            )}
                        </Card>
                    )}
                </div>
            );
        }

        function ProfileBackup() {
            const exportData = () => {
                const data = { progress: DB.progress(FIXED_USER.id) };
                const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'datapath_save.json'; a.click();
            };
            return (
                <Card sx={{maxWidth:500, margin:'0 auto'}}>
                    <h2>Backup</h2>
                    <p style={{margin:'15px 0', color:C.muted}}>Salve seu progresso localmente.</p>
                    <Btn onClick={exportData}>Exportar JSON</Btn>
                </Card>
            );
        }

        function AppShell() {
            const [page,setPage]=useState("dashboard");
            const nav = [
                {id:"dashboard",i:"🏠",l:"Início"},
                {id:"journey",i:"🗺️",l:"Trilhas 90D"},
                {id:"sql",i:"🗄️",l:"SQL Sandbox"},
                {id:"profile",i:"👤",l:"Backup"}
            ];

            return (
                <div style={{display:"flex",minHeight:"100vh"}}>
                    <aside style={{width:250,background:C.surface,padding:25,borderRight:`1px solid ${C.border}`}}>
                        <h2 style={{fontFamily:"'Syne'",color:C.accent,marginBottom:40}}>DATAPATH ⚡</h2>
                        <nav style={{display:"flex",flexDirection:"column",gap:10}}>
                            {nav.map(n => (
                                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                                    textAlign:"left",padding:12,borderRadius:10,background:page===n.id?C.accent+"15":"none",
                                    border:"none",color:page===n.id?C.accent:C.muted,cursor:"pointer",fontWeight:700
                                }}>{n.i} {n.l}</button>
                            ))}
                        </nav>
                    </aside>
                    <main style={{flex:1,padding:40,overflowY:"auto",maxHeight:"100vh"}}>
                        {page==="dashboard" && <Dashboard go={setPage}/>}
                        {page==="journey" && <Journey />}
                        {page==="sql" && <SQLConsole />}
                        {page==="profile" && <ProfileBackup />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthProvider><ProgressProvider><AppShell /></ProgressProvider></AuthProvider>);
    </script>
</body>
</html>
