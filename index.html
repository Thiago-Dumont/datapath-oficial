<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPath — Master Data Science (90 Dias/Trilha)</title>
    <!-- Bibliotecas Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #020817; color: #e2e8f0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        #root { min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020817; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover:hover { transform: translateY(-3px); border-color: #6366f1; transition: all 0.3s; }
        
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 14px; color: #a5f3fc; border: 1px solid #1e293b; margin: 15px 0; }
        .sql-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .sql-table th { background: #1e293b; padding: 12px; text-align: left; color: #6366f1; border-bottom: 2px solid #334155; }
        .sql-table td { padding: 10px; border-bottom: 1px solid #1e293b; color: #94a3b8; }
        
        .lesson-body h1, .lesson-body h2 { font-family: 'Syne'; margin: 20px 0 10px; color: #fff; }
        .lesson-body p { line-height: 1.7; color: #94a3b8; margin-bottom: 15px; }
        .lesson-body code { color: #f472b6; background: rgba(244,114,182,0.1); padding: 2px 5px; border-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

        // ============================================================
        // SEGURANÇA E BANCO DE DADOS (LÓGICA ORIGINAL PRESERVADA)
        // ============================================================
        const DB = {
            g: (k) => JSON.parse(localStorage.getItem("dp_v4_"+k) || "null"),
            s: (k,v) => localStorage.setItem("dp_v4_"+k, JSON.stringify(v)),
            progress: (id) => DB.g("prog_"+id) || {
                xp: 0, level: 1, 
                completedPython: [], completedSQL: [], completedPBI: [],
                lastStudy: null
            },
            setProgress: (id, p) => DB.s("prog_"+id, p)
        };

        // ============================================================
        // DATASETS PARA O SANDBOX SQL
        // ============================================================
        const TABLES = {
            produtos: [
                { id: 101, nome: "Notebook Ultra", categoria: "Hardware", preco: 4500.00, qtd_estoque: 15 },
                { id: 102, nome: "Monitor 27 4K", categoria: "Hardware", preco: 2100.00, qtd_estoque: 8 },
                { id: 103, nome: "Teclado Mecânico", categoria: "Periféricos", preco: 450.00, qtd_estoque: 42 },
                { id: 104, nome: "Mouse Gamer", categoria: "Periféricos", preco: 280.00, qtd_estoque: 60 },
                { id: 105, nome: "SSD 1TB NVMe", categoria: "Armazenamento", preco: 550.00, qtd_estoque: 25 }
            ],
            clientes: [
                { id: 1, nome: "Ricardo Santos", cidade: "São Paulo", status: "Premium" },
                { id: 2, nome: "Carla Souza", cidade: "Rio de Janeiro", status: "Ativo" },
                { id: 3, nome: "Beatriz Oliveira", cidade: "Belo Horizonte", status: "Premium" }
            ],
            vendas: [
                { id: 5001, cliente_id: 1, produto_id: 101, data: "2024-01-10", valor: 4500.00 },
                { id: 5002, cliente_id: 2, produto_id: 103, data: "2024-01-11", valor: 450.00 },
                { id: 5003, cliente_id: 1, produto_id: 105, data: "2024-01-12", valor: 550.00 }
            ]
        };

        // ============================================================
        // CONTEÚDO DIDÁTICO DETALHADO (TRILHAS 90 DIAS)
        // ============================================================
        const CURRICULUM = {
            python: {
                d1: {
                    title: "O Início: Configuração e Colab",
                    colab: "https://colab.research.google.com/notebooks/intro.ipynb",
                    topics: [
                        { t: "Por que Python para Dados?", c: "<h1>Python para Dados</h1><p>Python é a linguagem líder em Data Science devido à sua sintaxe simples e bibliotecas poderosas como Pandas e NumPy.</p><h2>Prática no Google Colab</h2><p>Clique no botão acima para abrir seu primeiro notebook.</p>" },
                        { t: "Configurando o Ambiente Local", c: "<h2>Ambiente Local</h2><p>Para trabalhar localmente, recomendamos o <b>VS Code</b> com a extensão Python.</p><pre>pip install pandas numpy matplotlib</pre>" }
                    ]
                },
                d2: {
                    title: "Variáveis e Tipos de Dados",
                    colab: "https://colab.research.google.com/",
                    topics: [
                        { t: "Tipos Primitivos", c: "<h2>Tipos Primitivos</h2><p>Python trabalha com Inteiros, Floats, Strings e Booleanos.</p><pre>idade = 25\npreco = 45.90\nnome = 'Data Scientist'\nstatus = True</pre>" }
                    ]
                }
            },
            sql: {
                d1: {
                    title: "Introdução ao SQL e Tabelas",
                    topics: [
                        { t: "O que é SQL?", c: "<h1>Structured Query Language</h1><p>SQL é a linguagem padrão para interagir com bancos de dados relacionais.</p>" },
                        { t: "Explorando a Tabela Produtos", c: "<h2>Tabela Produtos</h2><p>Nesta plataforma, temos a tabela <code>produtos</code> com campos de preço e quantidade.</p><pre>SELECT * FROM produtos;</pre>" }
                    ]
                }
            },
            powerbi: {
                d1: {
                    title: "Business Intelligence e Power BI",
                    topics: [
                        { t: "Conceitos de BI", c: "<h1>O que é BI?</h1><p>BI é o processo de transformar dados brutos em insights para tomada de decisão.</p>" }
                    ]
                }
            }
        };

        // Função para garantir que todos os 90 dias existam
        const buildTracks = () => {
            const tracks = ["python", "sql", "powerbi"];
            tracks.forEach(tr => {
                for(let i=1; i<=90; i++){
                    if(!CURRICULUM[tr]["d"+i]) {
                        CURRICULUM[tr]["d"+i] = {
                            title: `Evolução: Dia ${i}`,
                            topics: [
                                { t: "Teoria do Dia", c: `<h1>Conteúdo do Dia ${i}</h1><p>Aprofundamento técnico focado em ${tr}.</p>` },
                                { t: "Laboratório Prático", c: `<h2>Desafio do Dia ${i}</h2><p>Implemente uma solução real usando as ferramentas aprendidas.</p>` }
                            ],
                            colab: tr === "python" ? "https://colab.research.google.com/" : null
                        };
                    }
                }
            });
        };
        buildTracks();

        // ============================================================
        // COMPONENTES E LÓGICA DE INTERFACE
        // ============================================================
        const ProgCtx = createContext(null);

        function App() {
            const [page, setPage] = useState("dashboard");
            const [progress, setProgress] = useState(DB.progress("master"));
            const [selTrack, setSelTrack] = useState("python");
            const [selDay, setSelDay] = useState(null);
            const [activeTopic, setActiveTopic] = useState(null);

            const completeDay = (track, dayNum) => {
                const key = track === "python" ? "completedPython" : track === "sql" ? "completedSQL" : "completedPBI";
                if(progress[key].includes(dayNum)) return;
                const newProg = { ...progress, [key]: [...progress[key], dayNum], xp: progress.xp + 50 };
                newProg.level = Math.floor(Math.sqrt(newProg.xp/100))+1;
                setProgress(newProg);
                DB.setProgress("master", newProg);
            };

            return (
                <ProgCtx.Provider value={{progress, completeDay}}>
                    <div style={{display: "flex", minHeight: "100vh"}}>
                        {/* Sidebar */}
                        <aside style={{width: "260px", background: "#0a1628", padding: "40px 25px", borderRight: "1px solid #1e293b", position: "fixed", height: "100vh"}}>
                            <h2 style={{fontFamily: "'Syne'", color: "#6366f1", marginBottom: "40px"}}>DATAPATH ⚡</h2>
                            <nav style={{display: "flex", flexDirection: "column", gap: "10px"}}>
                                <button onClick={() => {setPage("dashboard"); setSelDay(null);}} style={navBtn(page==="dashboard")}>🏠 Dashboard</button>
                                <button onClick={() => {setPage("journey"); setSelDay(null);}} style={navBtn(page==="journey")}>🗺️ Trilhas 90D</button>
                                <button onClick={() => {setPage("sandbox"); setSelDay(null);}} style={navBtn(page==="sandbox")}>🗄️ SQL Sandbox</button>
                            </nav>
                        </aside>

                        {/* Main Content */}
                        <main style={{flex: 1, marginLeft: "260px", padding: "50px"}}>
                            {page === "dashboard" && <Dashboard setPage={setPage} />}
                            {page === "journey" && !selDay && <JourneyMap setTrack={setSelTrack} setDay={setSelDay} track={selTrack} />}
                            {selDay && <LessonView track={selTrack} day={selDay} setDay={setSelDay} topic={activeTopic} setTopic={setActiveTopic} />}
                            {page === "sandbox" && <SQLSandbox />}
                        </main>
                    </div>
                </ProgCtx.Provider>
            );
        }

        const navBtn = (active) => ({
            textAlign: "left", padding: "14px", borderRadius: "10px", border: "none", cursor: "pointer",
            background: active ? "#6366f120" : "transparent", color: active ? "#6366f1" : "#64748b",
            fontWeight: "700", fontSize: "15px"
        });

        // --- DASHBOARD COMPONENT ---
        function Dashboard() {
            const {progress} = useContext(ProgCtx);
            return (
                <div className="fade">
                    <h1 style={{fontFamily: "'Syne'", fontSize: "32px", marginBottom: "30px"}}>Seu Dashboard</h1>
                    <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "20px"}}>
                        <div className="glass" style={{padding: "25px", borderRadius: "20px"}}>
                            <div style={{color: "#64748b", fontSize: "14px"}}>XP TOTAL</div>
                            <div style={{fontSize: "40px", fontWeight: "900", color: "#6366f1"}}>{progress.xp}</div>
                            <div style={{marginTop: "10px"}}>Nível {progress.level}</div>
                        </div>
                        <div className="glass" style={{padding: "25px", borderRadius: "20px"}}>
                            <h4 style={{marginBottom: "15px"}}>Atividade das Trilhas</h4>
                            <Stat track="Python" val={progress.completedPython.length} color="#3b82f6" />
                            <Stat track="SQL" val={progress.completedSQL.length} color="#10b981" />
                            <Stat track="Power BI" val={progress.completedPBI.length} color="#f59e0b" />
                        </div>
                    </div>
                </div>
            );
        }

        const Stat = ({track, val, color}) => (
            <div style={{marginBottom: "12px"}}>
                <div style={{display: "flex", justifyContent: "space-between", fontSize: "13px", marginBottom: "5px"}}><span>{track}</span><span>{val}/90d</span></div>
                <div style={{background: "#1e293b", height: "6px", borderRadius: "10px"}}><div style={{width: `${(val/90)*100}%`, background: color, height: "100%", borderRadius: "10px"}}/></div>
            </div>
        );

        // --- JOURNEY MAP COMPONENT ---
        function JourneyMap({setTrack, setDay, track}) {
            const {progress} = useContext(ProgCtx);
            const list = track === "python" ? progress.completedPython : track === "sql" ? progress.completedSQL : progress.completedPBI;

            return (
                <div className="fade">
                    <div style={{display: "flex", justifyContent: "space-between", marginBottom: "40px"}}>
                        <h2 style={{fontFamily: "'Syne'"}}>Mapa de Especialização</h2>
                        <div style={{display: "flex", gap: "10px"}}>
                            {["python", "sql", "powerbi"].map(t => (
                                <button key={t} onClick={() => setTrack(t)} style={{
                                    padding: "10px 20px", borderRadius: "8px", border: "none", cursor: "pointer",
                                    background: track === t ? "#6366f1" : "#0f172a", color: "#fff", fontWeight: "700"
                                }}>{t.toUpperCase()}</button>
                            ))}
                        </div>
                    </div>
                    <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: "12px"}}>
                        {Array.from({length: 90}, (_, i) => {
                            const d = i + 1;
                            const isDone = list.includes(d);
                            const isLocked = d > list.length + 1;
                            return (
                                <div key={d} onClick={() => !isLocked && setDay(d)} className="card-hover" style={{
                                    aspectRatio: "1/1", borderRadius: "15px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                                    background: isDone ? "#10b98120" : isLocked ? "#0a1628" : "#0f172a",
                                    border: `1px solid ${isDone ? "#10b981" : "#1e293b"}`,
                                    opacity: isLocked ? 0.4 : 1, cursor: isLocked ? "not-allowed" : "pointer"
                                }}>
                                    <span style={{fontSize: "10px", opacity: 0.6}}>DIA</span>
                                    <span style={{fontSize: "22px", fontWeight: "900"}}>{d}</span>
                                    {isDone && <span>✓</span>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // --- LESSON VIEW COMPONENT ---
        function LessonView({track, day, setDay, topic, setTopic}) {
            const {completeDay, progress} = useContext(ProgCtx);
            const dayData = CURRICULUM[track]["d"+day];
            const isDone = (track === "python" ? progress.completedPython : track === "sql" ? progress.completedSQL : progress.completedPBI).includes(day);

            useEffect(() => { if(dayData) setTopic(dayData.topics[0]); }, [day]);

            return (
                <div className="fade" style={{maxWidth: "1000px"}}>
                    <button onClick={() => setDay(null)} style={{background: "none", border: "none", color: "#6366f1", cursor: "pointer", marginBottom: "20px", fontWeight: "700"}}>← Voltar ao Mapa</button>
                    
                    <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "30px"}}>
                        <div>
                            <span style={{color: "#6366f1", fontWeight: "800"}}>DIA {day}</span>
                            <h1 style={{fontFamily: "'Syne'", fontSize: "32px"}}>{dayData.title}</h1>
                        </div>
                        {dayData.colab && (
                            <a href={dayData.colab} target="_blank" style={{padding: "12px 25px", background: "#f59e0b", color: "#000", borderRadius: "8px", textDecoration: "none", fontWeight: "700"}}>Abrir no Google Colab 🚀</a>
                        )}
                    </div>

                    <div style={{display: "grid", gridTemplateColumns: "280px 1fr", gap: "30px"}}>
                        <aside className="glass" style={{borderRadius: "15px", height: "fit-content"}}>
                            {dayData.topics.map((t, i) => (
                                <div key={i} onClick={() => setTopic(t)} style={{
                                    padding: "15px", cursor: "pointer", borderLeft: topic?.t === t.t ? "4px solid #6366f1" : "4px solid transparent",
                                    background: topic?.t === t.t ? "#6366f110" : "transparent", transition: "0.2s"
                                }}>{t.t}</div>
                            ))}
                            <button onClick={() => completeDay(track, day)} disabled={isDone} style={{
                                width: "100%", padding: "15px", border: "none", background: isDone ? "#10b981" : "#6366f1", color: "#fff",
                                fontWeight: "700", cursor: isDone ? "default" : "pointer", marginTop: "10px", borderBottomLeftRadius: "15px", borderBottomRightRadius: "15px"
                            }}>{isDone ? "Concluído ✅" : "Marcar como Concluído"}</button>
                        </aside>
                        
                        <div className="glass lesson-body" style={{padding: "40px", borderRadius: "20px", minHeight: "500px"}}>
                            {topic && <div dangerouslySetInnerHTML={{__html: topic.c}} />}
                        </div>
                    </div>
                </div>
            );
        }

        // --- SQL SANDBOX COMPONENT ---
        function SQLSandbox() {
            const [query, setQuery] = useState("SELECT * FROM produtos;");
            const [result, setResult] = useState(null);

            const execute = () => {
                const q = query.toLowerCase().trim();
                let data = [];
                if(q.includes("from produtos")) data = TABLES.produtos;
                else if(q.includes("from clientes")) data = TABLES.clientes;
                else if(q.includes("from vendas")) data = TABLES.vendas;
                else { setResult({error: "Tabelas disponíveis: produtos, clientes, vendas"}); return; }
                
                if(q.includes("where preco > 1000")) data = data.filter(p => p.preco > 1000);
                setResult({data});
            };

            return (
                <div className="fade">
                    <h2 style={{fontFamily: "'Syne'", marginBottom: "20px"}}>SQL Sandbox & Terminal</h2>
                    <div className="glass" style={{padding: "25px", borderRadius: "20px"}}>
                        <textarea value={query} onChange={e => setQuery(e.target.value)} style={{
                            width: "100%", height: "120px", background: "#000", color: "#10b981", border: "none", 
                            padding: "20px", fontFamily: "'Fira Code'", borderRadius: "10px", fontSize: "16px"
                        }} />
                        <button onClick={execute} style={{
                            marginTop: "15px", padding: "12px 30px", background: "#6366f1", color: "#fff", 
                            border: "none", borderRadius: "8px", cursor: "pointer", fontWeight: "700"
                        }}>Executar Query</button>
                    </div>

                    {result && (
                        <div className="glass fade" style={{marginTop: "30px", padding: "25px", borderRadius: "20px", overflowX: "auto"}}>
                            {result.error ? <div style={{color: "#ef4444"}}>{result.error}</div> : (
                                <table className="sql-table">
                                    <thead>
                                        <tr>{Object.keys(result.data[0] || {}).map(k => <th key={k}>{k}</th>)}</tr>
                                    </thead>
                                    <tbody>
                                        {result.data.map((row, i) => (
                                            <tr key={i}>{Object.values(row).map((v, j) => <td key={j}>{v}</td>)}</tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
