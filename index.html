        function runSQL(q) {
            const ql = q.toLowerCase().trim();
            if (!ql.startsWith("select")) return {error:"Apenas SELECT é permitido no sandbox."};
            let rows = [];
            if (ql.includes("from produtos")) rows = [...TABLES.produtos];
            else if (ql.includes("from vendas")) rows = [...TABLES.vendas];
            else if (ql.includes("from clientes")) rows = [...TABLES.clientes];
            else return {error:"Tabelas: produtos, vendas, clientes"};
            
            const wm = ql.match(/where (.+?)(?:order by|group by|limit|having|$)/);
            if (wm) {
                const wc = wm[1].trim();
                if (wc.includes("preco >")) { const v=parseInt(wc.match(/preco > (\d+)/)?.[1]||0); rows=rows.filter(r=>r.preco>v); }
                if (wc.includes("preco <")) { const v=parseInt(wc.match(/preco < (\d+)/)?.[1]||0); rows=rows.filter(r=>r.preco<v); }
                if (wc.includes("valor >")) { const v=parseInt(wc.match(/valor > (\d+)/)?.[1]||0); rows=rows.filter(r=>r.valor>v); }
                if (wc.includes("categoria = ")) { const v=wc.match(/categoria = '([^']+)'/)?.[1]; if(v) rows=rows.filter(r=>r.categoria===v); }
                if (wc.includes("plano = ")) { const v=wc.match(/plano = '([^']+)'/)?.[1]; if(v) rows=rows.filter(r=>r.plano===v); }
            }
            if (ql.includes("group by")) {
                const gb = ql.match(/group by (\w+)/)?.[1];
                if (gb) {
                    const grouped = {};
                    rows.forEach(r => { const k=r[gb]; if(!grouped[k]) grouped[k]={[gb]:k,count:0,total:0}; grouped[k].count++; grouped[k].total+=(r.valor||r.preco||0); });
                    rows = Object.values(grouped).map(g=>({[gb]:g[gb],"COUNT(*)":g.count,"SUM(valor/preco)":g.total}));
                }
            }
            if (ql.includes("order by")) {
                const ob = ql.match(/order by (\w+)(?: (asc|desc))?/);
                if (ob) { const [,col,dir="asc"]=ob; rows=[...rows].sort((a,b)=>{const va=a[col]||0,vb=b[col]||0;return dir==="desc"?vb-va:va-vb;}); }
            }
            const lm = ql.match(/limit (\d+)/);
            if (lm) rows = rows.slice(0, parseInt(lm[1]));
            return {rows, count:rows.length};
        }

            {id:1,level:"Iniciante",title:"Calculadora de IMC",desc:"Calcule e classifique o IMC (Abaixo do peso / Normal / Sobrepeso / Obesidade).",hint:"IMC = peso / (altura**2). Use if/elif para classificar.",xp:30},
            {id:2,level:"Iniciante",title:"Tabuada Automática",desc:"Gere a tabuada de 1 a 10 de qualquer número usando for.",hint:"for num in range(1,11): print(f'{n} x {num} = {n*num}')",xp:25},
            {id:3,level:"Iniciante",title:"Par ou Ímpar",desc:"Função que recebe uma lista de números e separa em pares e ímpares.",hint:"num % 2 == 0 → par. Use list comprehension.",xp:25},
            {id:4,level:"Intermediário",title:"Estatísticas de Salários",desc:"Calcule média, mediana, max, min e variância de uma lista de salários sem bibliotecas.",hint:"Ordene a lista para mediana. Variância = média dos quadrados das diferenças.",xp:50},
            {id:5,level:"Intermediário",title:"Filtro de Funcionários",desc:"Filtre funcionários (lista de dicts) com salário > 5000 e departamento 'TI' ou 'Dados'.",hint:"[f for f in lista if f['sal']>5000 and f['dept'] in ['TI','Dados']]",xp:50},
            {id:6,level:"Intermediário",title:"Relatório de Vendas",desc:"Agrupe lista de vendas por mês e calcule total, qtd e ticket médio.",hint:"Use dicionários para acumular. {mes: {total, qtd}}",xp:55},
            {id:7,level:"Avançado",title:"Análise com Pandas",desc:"Carregue dados de vendas e calcule: total/categoria, top produto, variação mensal.",hint:"df.groupby('cat').agg({'valor':['sum','mean','count']})",xp:80},
            {id:8,level:"Avançado",title:"Mini ETL Pipeline",desc:"Construa extract() → transform() → load() para processar dados fictícios.",hint:"Cada função tem responsabilidade única. transform() normaliza e filtra.",xp:90},
        ];

        const SQL_EX = [
            {id:1,level:"Iniciante",title:"SELECT com colunas",desc:"Selecione nome, categoria e preço de produtos, ordenados por preço desc.",hint:"SELECT nome, categoria, preco FROM produtos ORDER BY preco DESC",xp:20},
            {id:2,level:"Iniciante",title:"Filtrar Produtos",desc:"Produtos com preço acima de R$300 da categoria Tech.",hint:"WHERE preco > 300 AND categoria = 'Tech'",xp:25},
            {id:3,level:"Iniciante",title:"Top 3 Mais Caros",desc:"Os 3 produtos mais caros (nome e preço).",hint:"ORDER BY preco DESC LIMIT 3",xp:25},
            {id:4,level:"Intermediário",title:"Total por Categoria",desc:"Total de vendas e quantidade por categoria.",hint:"GROUP BY categoria com SUM e COUNT",xp:45},
            {id:5,level:"Intermediário",title:"Melhor Vendedor",desc:"Vendedor com maior faturamento total.",hint:"GROUP BY vendedor + SUM(valor) + ORDER BY + LIMIT 1",xp:50},
            {id:6,level:"Intermediário",title:"Acima da Média",desc:"Produtos com preço acima da média geral.",hint:"WHERE preco > (SELECT AVG(preco) FROM produtos)",xp:60},
            {id:7,level:"Avançado",title:"Análise por Vendedor",desc:"Faturamento, qtd de vendas e ticket médio por vendedor.",hint:"GROUP BY vendedor com SUM, COUNT, AVG",xp:70},
            {id:8,level:"Avançado",title:"Clientes Premium",desc:"Quantos clientes de cada plano existem?",hint:"GROUP BY plano com COUNT(*) FROM clientes",xp:65},
        ];

        // ── CONTEXTOS INTEGRADOS ────────────────────────────────────
        const AuthCtx = createContext(null);
        const ProgCtx = createContext(null);

        // Usuário fixo para manter compatibilidade com DB sem login
        const FIXED_USER = { id: "master-user", name: "Estudante de Dados" };

        function AuthProvider({children}) {
            const [user,setUser] = useState(FIXED_USER);
            const [loading,setLoading] = useState(false);
            const logout=()=>{ alert("Seu progresso é salvo automaticamente neste navegador."); };
            return <AuthCtx.Provider value={{user,loading,logout}}>{children}</AuthCtx.Provider>;
        }

        function ProgressProvider({children}) {
            const {user}=useContext(AuthCtx);
            const [progress,setProgress]=useState(null);
            useEffect(()=>{ if(user) setProgress(DB.progress(user.id)); },[user]);

            const save=useCallback((upd)=>{
                if(!user) return null;
                const cur=DB.progress(user.id);
                const updated={...cur,...upd}; updated.level=calcLevel(updated.xp);
                DB.setProgress(user.id,updated); setProgress({...updated}); return updated;
            },[user]);

            const completeDay=useCallback((dayNum,xpAmt)=>{
                if(!user) return;
                const cur=DB.progress(user.id);
                if(cur.completedDays.includes(dayNum)) return;
                const days=[...cur.completedDays,dayNum], newXP=cur.xp+xpAmt;
                const today=new Date().toDateString();
                save({completedDays:days,xp:newXP,lastStudy:today});
            },[user,save]);

            const addXP=useCallback((amt)=>{
                if(!user) return;
                const cur=DB.progress(user.id);
                save({xp:cur.xp+amt});
            },[user,save]);

            return <ProgCtx.Provider value={{progress,save,completeDay,addXP}}>{children}</ProgCtx.Provider>;
        }

        const useAuth=()=>useContext(AuthCtx);
        const useProgress=()=>useContext(ProgCtx);

        // ── UI PRIMITIVES INTEGRAL ──────────────────────────────────
        const C = { bg:"#020817", surface:"#0a1628", card:"#0f172a", border:"#1e293b", text:"#e2e8f0", muted:"#64748b", accent:"#6366f1", yellow:"#f59e0b", red:"#ef4444", green:"#10b981", blue:"#3b82f6" };

        const XPBar = ({xp,level}) => {
            const lo=xpForLevel(level), hi=xpForNext(level);
            const pct=Math.min(100,((xp-lo)/(hi-lo))*100);
            return (
                <div style={{width:"100%"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:4}}>
                        <span>Nível {level}</span><span>{xp} XP</span>
                    </div>
                    <div style={{background:C.border,borderRadius:999,height:7}}>
                        <div style={{width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)",height:"100%",borderRadius:999,transition:"width 0.7s"}}/>
                    </div>
                </div>
            );
        };

        const Btn = ({children,onClick,v="primary",sx={}}) => {
            const vs={
                primary:{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none"},
                secondary:{background:C.card,color:C.text,border:`1px solid ${C.border}`},
                success:{background:C.green,color:"#fff",border:"none"}
            };
            return <button onClick={onClick} style={{padding:"10px 20px",borderRadius:8,fontWeight:700,cursor:"pointer",...vs[v],...sx}}>{children}</button>;
        };

        const Card = ({children,sx={}}) => <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:22,...sx}}>{children}</div>;
        const Badge = ({text,color=C.accent}) => <span style={{background:color+"22",color,padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,border:`1px solid ${color}44`}}>{text}</span>;

        // ── PÁGINAS INTEGRAIS ───────────────────────────────────────

        function Dashboard({go}) {
            const {progress}=useProgress();
            if(!progress) return null;
            const dayNum=progress.completedDays.length+1;
            return (
                <div style={{maxWidth:1100,margin:"0 auto",display:"flex",flexDirection:"column",gap:20,animation:"fadeIn 0.5s"}}>
                    <div style={{background:"linear-gradient(135deg,#1e1b4b,#1a2744)",border:`1px solid ${C.border}`,borderRadius:18,padding:30}}>
                        <h2 style={{fontFamily:"'Syne'",fontSize:28,marginBottom:10}}>Olá, Explorador! 👋</h2>
                        <p style={{color:C.muted}}>Você está no <strong>Dia {dayNum}</strong> da sua jornada de dados.</p>
                        <div style={{display:"flex",gap:10,marginTop:20}}>
                            <Btn onClick={()=>go("journey")}>Continuar Jornada</Btn>
                            <Btn v="secondary" onClick={()=>go("profile")}>Backup de Dados</Btn>
                        </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px, 1fr))",gap:15}}>
                        <Card><h4>Nível {progress.level}</h4><XPBar xp={progress.xp} level={progress.level}/></Card>
                        <Card><h4>Streak</h4><p style={{fontSize:24,fontWeight:900,color:C.yellow}}>🔥 {progress.streak} dias</p></Card>
                        <Card><h4>XP Total</h4><p style={{fontSize:24,fontWeight:900,color:C.accent}}>⚡ {progress.xp}</p></Card>
                    </div>
                </div>
            );
        }

        function Journey() {
            const {progress,completeDay}=useProgress();
            const [sel,setSel]=useState(null);
            const curDay=progress?progress.completedDays.length+1:1;

            if(sel) return (
                <div style={{maxWidth:700,margin:"0 auto",animation:"fadeIn 0.3s"}}>
                    <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",marginBottom:20}}>← Voltar</button>
                    <Card>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
                            <Badge text={`Dia ${sel.day}`}/>
                            <Badge text={`+${sel.xp} XP`} color={C.green}/>
                        </div>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>{sel.title}</h2>
                        <p style={{lineHeight:1.6,marginBottom:20}}>{sel.mission}</p>
                        <div style={{background:C.surface,padding:15,borderRadius:10,marginBottom:20}}>
                            <h4 style={{marginBottom:10,color:C.accent}}>Microtarefas:</h4>
                            {sel.tasks.map((t,i)=><div key={i} style={{marginBottom:5}}>• {t}</div>)}
                        </div>
                        {progress.completedDays.includes(sel.day) 
                            ? <div style={{color:C.green,fontWeight:800,textAlign:"center"}}>✅ Concluído!</div>
                            : <Btn sx={{width:"100%"}} onClick={()=>{completeDay(sel.day,sel.xp);setSel(null);}}>Marcar como Concluído</Btn>
                        }
                    </Card>
                </div>
            );

            return (
                <div style={{animation:"fadeIn 0.5s"}}>
                    <h2 style={{fontFamily:"'Syne'",marginBottom:20}}>Mapa da Jornada</h2>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
                        {DAY_DATA.map(d => {
                            const done=progress.completedDays.includes(d.day);
                            const locked=d.day > curDay;
                            return (
                                <div key={d.day} onClick={()=>!locked && setSel(d)} style={{
                                    padding:15, borderRadius:12, textAlign:"center", cursor:locked?"not-allowed":"pointer",
                                    background:done?C.green+"22":locked?C.surface:C.card,
                                    border:`1px solid ${done?C.green:C.border}`, opacity:locked?0.4:1
                                }}>
                                    <div style={{fontSize:10,color:C.muted}}>DIA</div>
                                    <div style={{fontSize:20,fontWeight:900}}>{d.day}</div>
                                    {done && <div style={{fontSize:10}}>✓</div>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function SQLConsole() {
            const [q,setQ]=useState("SELECT * FROM produtos;");
            const [res,setRes]=useState(null);
            return (
                <div style={{maxWidth:900,margin:"0 auto",animation:"fadeIn 0.5s"}}>
                    <Card>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:15}}>SQL Sandbox</h2>
                        <textarea value={q} onChange={e=>setQ(e.target.value)} style={{width:"100%",height:100,background:"#000",color:C.green,padding:15,fontFamily:"monospace",borderRadius:8,border:"none"}}/>
                        <Btn sx={{marginTop:15}} onClick={()=>setRes(runSQL(q))}>Executar</Btn>
                    </Card>
                    {res && (
                        <Card sx={{marginTop:20,overflowX:"auto"}}>
                            {res.error ? <span style={{color:C.red}}>{res.error}</span> : (
                                <table style={{width:"100%",borderCollapse:"collapse"}}>
                                    <thead><tr>{Object.keys(res.rows[0]||{}).map(k=><th key={k} style={{textAlign:"left",padding:10,borderBottom:`1px solid ${C.border}`}}>{k}</th>)}</tr></thead>
                                    <tbody>{res.rows.map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j} style={{padding:10}}>{String(v)}</td>)}</tr>)}</tbody>
                                </table>
                            )}
                        </Card>
                    )}
                </div>
            );
        }

        function ProfileBackup() {
            const exportData = () => {
                const data = {
                    progress: DB.progress(FIXED_USER.id),
                    notes: DB.notes(FIXED_USER.id),
                    resume: DB.resume(FIXED_USER.id)
                };
                const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'datapath_save.json';
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = JSON.parse(event.target.result);
                    DB.setProgress(FIXED_USER.id, data.progress);
                    DB.setNotes(FIXED_USER.id, data.notes);
                    DB.setResume(FIXED_USER.id, data.resume);
                    alert("Dados restaurados! A página irá atualizar.");
                    window.location.reload();
                };
                reader.readAsText(file);
            };

            return (
                <div style={{maxWidth:600,margin:"0 auto",animation:"fadeIn 0.5s"}}>
                    <Card>
                        <h2 style={{fontFamily:"'Syne'",marginBottom:20}}>Backup e Sincronização</h2>
                        <p style={{color:C.muted,marginBottom:20}}>Como não há login, use estas opções para transferir seu progresso entre computadores.</p>
                        <div style={{display:"flex",flexDirection:"column",gap:15}}>
                            <Btn onClick={exportData}>Baixar Arquivo de Progresso (.json)</Btn>
                            <div style={{marginTop:20}}>
                                <label style={{display:"block",marginBottom:10,fontWeight:700}}>Carregar Progresso:</label>
                                <input type="file" accept=".json" onChange={importData} />
                            </div>
                        </div>
                    </Card>
                </div>
            );
        }

        // ── APP SHELL E NAVEGAÇÃO ───────────────────────────────────

        function AppShell() {
            const [page,setPage]=useState("dashboard");
            const nav = [
                {id:"dashboard",i:"🏠",l:"Início"},
                {id:"journey",i:"🗺️",l:"Jornada"},
                {id:"sql",i:"🗄️",l:"SQL Sandbox"},
                {id:"profile",i:"👤",l:"Backup"}
            ];

            return (
                <div style={{display:"flex",minHeight:"100vh"}}>
                    <aside style={{width:250,background:C.surface,padding:25,borderRight:`1px solid ${C.border}`}}>
                        <h2 style={{fontFamily:"'Syne'",color:C.accent,marginBottom:40}}>DATAPATH ⚡</h2>
                        <nav style={{display:"flex",flexDirection:"column",gap:10}}>
                            {nav.map(n => (
                                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                                    textAlign:"left",padding:12,borderRadius:10,background:page===n.id?C.accent+"15":"none",
                                    border:"none",color:page===n.id?C.accent:C.muted,cursor:"pointer",fontWeight:700
                                }}>{n.i} {n.l}</button>
                            ))}
                        </nav>
                    </aside>
                    <main style={{flex:1,padding:40,overflowY:"auto",maxHeight:"100vh"}}>
                        {page==="dashboard" && <Dashboard go={setPage}/>}
                        {page==="journey" && <Journey />}
                        {page==="sql" && <SQLConsole />}
                        {page==="profile" && <ProfileBackup />}
                    </main>
                </div>
            );
        }

        // ── PONTO DE ENTRADA ────────────────────────────────────────

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AuthProvider>
                <ProgressProvider>
                    <AppShell />
                </ProgressProvider>
            </AuthProvider>
        );
    </script>
</body>
</html>
